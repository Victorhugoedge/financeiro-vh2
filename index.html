<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"/>
  <meta name="apple-mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-status-bar-style" content="default"/>
  <meta name="apple-mobile-web-app-title" content="Fin. VH"/>
  <meta name="theme-color" content="#f0f4f8"/>
  <title>Planejamento Financeiro</title>
  <link rel="manifest" href="manifest.json"/>
  <style>
    *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;margin:0;padding:0}
    html,body{height:100%;background:#f0f4f8;font-family:-apple-system,'SF Pro Display',sans-serif}
    input,select,button{font-family:inherit;-webkit-appearance:none}
    input,select{font-size:16px!important}
    ::-webkit-scrollbar{display:none}

    .app{min-height:100dvh;background:#f0f4f8;color:#1e293b;padding-bottom:calc(80px + env(safe-area-inset-bottom))}

    /* Header — light style */
    .header{background:#f0f4f8;color:#1e293b;
      padding:calc(env(safe-area-inset-top) + 14px) 20px 10px;
      display:flex;align-items:center;justify-content:space-between}
    .header-left{display:flex;align-items:center;gap:12px}
    .avatar{width:42px;height:42px;border-radius:50%;background:linear-gradient(135deg,#3b82f6,#1d4ed8);
      display:flex;align-items:center;justify-content:center;font-size:18px;font-weight:800;color:#fff;flex-shrink:0}
    .header h1{font-size:17px;font-weight:800;color:#1e293b;letter-spacing:-.3px}
    .header p{font-size:12px;color:#64748b;margin-top:1px}
    .header-icons{display:flex;gap:8px}
    .icon-btn{width:38px;height:38px;border-radius:50%;background:#fff;border:none;cursor:pointer;
      display:flex;align-items:center;justify-content:center;font-size:16px;
      box-shadow:0 1px 4px rgba(0,0,0,.08)}

    /* Bottom Nav */
    .bottom-nav{position:fixed;bottom:0;left:0;right:0;
      background:rgba(255,255,255,.97);backdrop-filter:blur(20px);
      border-top:1px solid #e8edf2;
      padding-bottom:env(safe-area-inset-bottom);
      display:flex;z-index:100}
    .nav-btn{flex:1;display:flex;flex-direction:column;align-items:center;
      justify-content:center;padding:10px 4px 8px;gap:2px;
      border:none;background:none;cursor:pointer;transition:transform .1s}
    .nav-btn:active{transform:scale(.9)}
    .nav-icon{font-size:20px;line-height:1}
    .nav-label{font-size:9px;font-weight:600;letter-spacing:.2px}
    .nav-dot{width:4px;height:4px;border-radius:50%;background:#3b82f6;margin-top:1px}

    /* Main */
    .main{padding:16px}

    /* Cards */
    .card{background:#fff;border-radius:20px;padding:16px;
      box-shadow:0 1px 6px rgba(0,0,0,.05);margin-bottom:12px}
    .grid2{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:12px}
    .stat-card{border-radius:16px;padding:14px 16px;background:#fff;box-shadow:0 1px 6px rgba(0,0,0,.05)}
    .stat-label{font-size:12px;font-weight:500;color:#64748b;margin-bottom:4px;display:flex;align-items:center;gap:6px}
    .stat-icon{width:28px;height:28px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:14px;flex-shrink:0}
    .stat-val{font-size:20px;font-weight:800;letter-spacing:-.5px}
    .stat-sub{font-size:11px;margin-top:2px;opacity:.7}

    /* Saldo principal card */
    .saldo-card{background:#fff;border-radius:20px;padding:18px 20px;margin-bottom:12px;
      box-shadow:0 1px 6px rgba(0,0,0,.05);display:flex;align-items:center;justify-content:space-between}
    .saldo-card-icon{width:44px;height:44px;border-radius:14px;background:#f0f9ff;
      display:flex;align-items:center;justify-content:center;font-size:22px}
    .saldo-card-label{font-size:13px;color:#64748b;font-weight:500;margin-bottom:2px}
    .saldo-card-val{font-size:26px;font-weight:800;letter-spacing:-.5px;color:#1e293b}

    /* Mes selector */
    .mes-bar{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px}
    .mes-btn{display:flex;align-items:center;gap:6px;background:#fff;border:none;border-radius:20px;
      padding:8px 14px;font-size:14px;font-weight:600;color:#1e293b;cursor:pointer;
      box-shadow:0 1px 4px rgba(0,0,0,.07)}
    .expandir-btn{display:flex;align-items:center;gap:6px;background:none;border:none;
      font-size:13px;font-weight:600;color:#64748b;cursor:pointer}

    /* Buttons */
    .btn{border:none;border-radius:12px;padding:11px 18px;font-size:14px;font-weight:700;cursor:pointer;min-height:44px;display:inline-flex;align-items:center;justify-content:center;gap:6px}
    .btn-primary{background:#3b82f6;color:#fff}
    .btn-success{background:#22c55e;color:#fff}
    .btn-danger{background:#ef4444;color:#fff}
    .btn-purple{background:#7c3aed;color:#fff}
    .btn-ghost{background:#f1f5f9;color:#475569}
    .btn-teal{background:#0d9488;color:#fff}
    .btn-sm{padding:8px 12px;font-size:12px;min-height:36px;border-radius:10px}

    /* Form */
    .form-group{margin-bottom:12px}
    .form-label{font-size:11px;font-weight:700;color:#64748b;text-transform:uppercase;letter-spacing:.5px;margin-bottom:6px;display:block}
    .form-input{width:100%;border:1.5px solid #e2e8f0;border-radius:12px;padding:13px 14px;font-size:16px;outline:none;color:#1e293b;background:#fff}
    .form-select{width:100%;border:1.5px solid #e2e8f0;border-radius:12px;padding:13px 14px;font-size:16px;outline:none;color:#1e293b;background:#fff}
    .form-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}

    /* Toggle */
    .toggle-wrap{display:flex;align-items:center;gap:12px;padding:12px 14px;border-radius:12px;cursor:pointer;transition:all .2s}
    .toggle-track{width:40px;height:22px;border-radius:99px;position:relative;flex-shrink:0;transition:background .2s}
    .toggle-thumb{width:18px;height:18px;border-radius:50%;background:#fff;position:absolute;top:2px;transition:left .2s;box-shadow:0 1px 3px rgba(0,0,0,.2)}

    /* Rows */
    .row{display:flex;gap:10px;align-items:center;justify-content:space-between;padding:14px 0;border-bottom:1px solid #f1f5f9}
    .row:last-child{border-bottom:none}

    /* Rank */
    .rank-item{display:flex;gap:10px;align-items:center;padding:14px;border-radius:16px;margin-bottom:10px;border:1px solid #f1f5f9;background:#fff}
    .rank-num{width:30px;height:30px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:13px;flex-shrink:0}

    /* Badges */
    .badge{border-radius:20px;padding:3px 10px;font-size:11px;font-weight:700;border:1px solid}
    .badge-fixa{background:#ede9fe;color:#7c3aed;border-color:#c4b5fd}
    .days-badge{font-size:11px;font-weight:700}

    /* Progress bar */
    .prog-wrap{background:#f1f5f9;border-radius:99px;height:6px;overflow:hidden}
    .prog-bar{height:100%;border-radius:99px;transition:width .5s}

    /* Toast */
    .toast{position:fixed;top:calc(env(safe-area-inset-top) + 16px);right:16px;left:16px;
      background:#1e293b;color:#fff;border-radius:14px;padding:14px 18px;
      font-weight:600;font-size:14px;box-shadow:0 8px 30px rgba(0,0,0,.25);
      z-index:999;text-align:center;animation:fadeIn .3s}
    @keyframes fadeIn{from{opacity:0;transform:translateY(-10px)}to{opacity:1;transform:translateY(0)}}

    /* Modal */
    .overlay{position:fixed;inset:0;background:rgba(15,23,42,.6);z-index:200;display:flex;align-items:flex-end}
    .modal{background:#fff;border-radius:24px 24px 0 0;width:100%;max-height:90vh;overflow-y:auto;padding:20px 20px calc(20px + env(safe-area-inset-bottom))}
    .modal-handle{width:36px;height:4px;background:#e2e8f0;border-radius:99px;margin:0 auto 16px}

    /* Invest card */
    .inv-card{background:#fff;border-radius:20px;padding:16px;margin-bottom:12px;box-shadow:0 1px 6px rgba(0,0,0,.05)}
    .ticker{font-variant-numeric:tabular-nums;font-weight:800;font-size:20px}

    /* CTA */
    .cta{border-radius:20px;padding:16px 20px;display:flex;align-items:center;justify-content:space-between;gap:12px;margin-bottom:12px}
    .section-title{font-size:16px;font-weight:800;margin-bottom:4px}
    .section-sub{font-size:12px;color:#64748b}
    .flex-between{display:flex;align-items:center;justify-content:space-between;gap:8px;flex-wrap:wrap}
    .flex-row{display:flex;align-items:center;gap:8px;flex-wrap:wrap}

    /* Gráfico */
    .chart-wrap{width:100%;overflow-x:hidden}
    svg.chart{width:100%;display:block}

    /* Save btn */
    .save-btn{border:none;border-radius:10px;padding:7px 13px;font-size:12px;font-weight:700;
      cursor:pointer;display:flex;align-items:center;gap:5px;
      background:#fff;color:#1e293b;box-shadow:0 1px 4px rgba(0,0,0,.1);transition:all .2s}
    .save-btn:active{transform:scale(.93)}
    .save-btn.saved{background:#f0fdf4;color:#16a34a}
    .save-dot{width:6px;height:6px;border-radius:50%;background:#f59e0b;animation:pulse-dot 1.5s ease-in-out infinite}
    .save-dot.ok{background:#22c55e;animation:none}
    @keyframes pulse-dot{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.5;transform:scale(.7)}}
  </style>
</head>
<body>
<div id="app"></div>

<script>
// ─── Config ──────────────────────────────────────────────────────────────────
const PRIORITY = {
  essencial: {label:'Essencial',color:'#ef4444',bg:'#fef2f2',border:'#fecaca',icon:'🔴',order:1},
  importante:{label:'Importante',color:'#f97316',bg:'#fff7ed',border:'#fed7aa',icon:'🟠',order:2},
  moderado:  {label:'Moderado',  color:'#eab308',bg:'#fefce8',border:'#fef08a',icon:'🟡',order:3},
  baixo:     {label:'Baixo',     color:'#22c55e',bg:'#f0fdf4',border:'#bbf7d0',icon:'🟢',order:4},
};
// CDI atual: 14.829% a.a. (maio/2026 - Banco Central)
const CDI_ANUAL = 0.14829;

const TIPOS_INV = {
  cdb:     {label:'CDB 100% CDI', icon:'🏦',cor:'#3b82f6',taxa:CDI_ANUAL,    isento:false},
  cdb120:  {label:'CDB 120% CDI', icon:'🏦',cor:'#6366f1',taxa:CDI_ANUAL*1.2,isento:false},
  lci:     {label:'LCI/LCA',      icon:'🌾',cor:'#22c55e',taxa:CDI_ANUAL*0.9,isento:true},
  tesouro: {label:'Tesouro Selic',icon:'🇧🇷',cor:'#f59e0b',taxa:CDI_ANUAL,    isento:false},
  fundos:  {label:'Fundos DI',    icon:'📈',cor:'#8b5cf6',taxa:CDI_ANUAL*0.95,isento:false},
  acoes:   {label:'Ações/ETF',    icon:'📉',cor:'#ef4444',taxa:0.1500,        isento:false},
  poupanca:{label:'Poupança',     icon:'🐷',cor:'#ec4899',taxa:0.0706,        isento:true},
  cripto:  {label:'Cripto',       icon:'₿', cor:'#f97316',taxa:0.2500,        isento:false},
  outro:   {label:'Outro',        icon:'💼',cor:'#64748b',taxa:CDI_ANUAL,     isento:false},
};

// ── Tabela IR regressiva (renda fixa) ───────────────────────────────────────
// até 180 dias: 22,5% | 181-360: 20% | 361-720: 17,5% | acima 720: 15%
function aliquotaIR(dias) {
  if(dias <= 180) return 0.225;
  if(dias <= 360) return 0.20;
  if(dias <= 720) return 0.175;
  return 0.15;
}

// IOF regressivo: dia 1 = 96%, dia 2 = 93%... dia 30 = 3%, após 30 = 0%
const IOF_TABLE = [96,93,90,86,83,80,76,73,70,66,63,60,56,53,50,46,43,40,36,33,30,26,23,20,16,13,10,6,3,0];
function aliquotaIOF(dias) {
  if(dias >= 30) return 0;
  return IOF_TABLE[Math.max(0, dias-1)] / 100;
}

// Calcula rendimento bruto, IOF, IR e líquido
function calcRendimento(aporte, taxaAnual, inicio, isento) {
  const msInicio = new Date(inicio+'T00:00:00').getTime();
  const dias = Math.max(0, Math.floor((Date.now() - msInicio) / 86400000));
  const anos = dias / 365.25;
  const bruto = aporte * (Math.pow(1 + taxaAnual, anos) - 1);
  if(bruto <= 0) return {bruto:0, iof:0, ir:0, liquido:0, dias};
  const iofVal  = isento ? 0 : bruto * aliquotaIOF(dias);
  const baseIR  = bruto - iofVal;
  const irVal   = isento ? 0 : baseIR * aliquotaIR(dias);
  const liquido = bruto - iofVal - irVal;
  return {bruto, iof:iofVal, ir:irVal, liquido, dias};
}

// ─── Helpers ─────────────────────────────────────────────────────────────────
const fmt = v => v.toLocaleString('pt-BR',{style:'currency',currency:'BRL'});
const fmtDate = d => d ? new Date(d+'T12:00:00').toLocaleDateString('pt-BR') : '—';
const daysUntil = d => {
  if(!d) return null;
  return Math.ceil((new Date(d+'T12:00:00') - new Date(new Date().toDateString())) / 86400000);
};
const rendAcum = (aporte, taxa, inicio) => {
  const anos = Math.max(0,(Date.now() - new Date(inicio+'T00:00:00').getTime())/(1000*60*60*24*365.25));
  return aporte * (Math.pow(1+taxa, anos) - 1);
};
const rps = (aporte,taxa) => aporte*taxa/(365.25*24*3600);
const getTaxaEfetiva = (inv) => inv.taxaCustom || (TIPOS_INV[inv.tipo]||TIPOS_INV.outro).taxa;
const getIsento = (inv) => inv.taxaCustom ? false : (TIPOS_INV[inv.tipo]||TIPOS_INV.outro).isento || false;

// ─── State ───────────────────────────────────────────────────────────────────
// ─── Dados padrão (primeiro acesso) ─────────────────────────────────────────
const DEFAULT_DESPESAS = [
  {id:1,nome:'Aluguel',valor:1500,vencimento:'2026-06-05',prioridade:'essencial',pago:false,categoria:'Moradia',fixa:true,diaVenc:5},
  {id:2,nome:'Internet',valor:120,vencimento:'2026-06-10',prioridade:'importante',pago:false,categoria:'Serviços',fixa:true,diaVenc:10},
  {id:3,nome:'Academia',valor:90,vencimento:'2026-06-15',prioridade:'baixo',pago:false,categoria:'Saúde',fixa:false,diaVenc:''},
  {id:4,nome:'Energia',valor:280,vencimento:'2026-06-08',prioridade:'essencial',pago:true,categoria:'Moradia',fixa:false,diaVenc:''},
  {id:5,nome:'Streaming',valor:45,vencimento:'2026-06-20',prioridade:'baixo',pago:false,categoria:'Lazer',fixa:true,diaVenc:20},
  {id:6,nome:'Plano de Saúde',valor:650,vencimento:'2026-06-03',prioridade:'essencial',pago:false,categoria:'Saúde',fixa:true,diaVenc:3},
];
const DEFAULT_RECEITAS = [
  {id:1,nome:'Salário',valor:5000,data:'2026-06-05',recorrente:true},
  {id:2,nome:'Freelance',valor:800,data:'2026-06-15',recorrente:false},
];
const DEFAULT_INVESTIMENTOS = [
  {id:1,nome:'CDB Nubank 120% CDI',tipo:'cdb',aporte:10000,inicio:'2025-01-10',taxaCustom:null},
  {id:2,nome:'Tesouro Selic 2029',tipo:'tesouro',aporte:5000,inicio:'2024-06-01',taxaCustom:null},
  {id:3,nome:'LCI Banco Inter',tipo:'lci',aporte:8000,inicio:'2025-03-15',taxaCustom:null},
];

// ─── Persistência localStorage ───────────────────────────────────────────────
function saveData() {
  try {
    localStorage.setItem('fvh_despesas',      JSON.stringify(state.despesas));
    localStorage.setItem('fvh_receitas',      JSON.stringify(state.receitas));
    localStorage.setItem('fvh_investimentos', JSON.stringify(state.investimentos));
    localStorage.setItem('fvh_lastSaved',     new Date().toISOString());
  } catch(e) { console.warn('Erro ao salvar:', e); }
}

function manualSave() {
  saveData();
  state.justSaved = true;
  render();
  setTimeout(() => { state.justSaved = false; render(); }, 2500);
}

function loadData() {
  try {
    const d = localStorage.getItem('fvh_despesas');
    const r = localStorage.getItem('fvh_receitas');
    const i = localStorage.getItem('fvh_investimentos');
    return {
      despesas:     d ? JSON.parse(d) : DEFAULT_DESPESAS,
      receitas:     r ? JSON.parse(r) : DEFAULT_RECEITAS,
      investimentos: i ? JSON.parse(i) : DEFAULT_INVESTIMENTOS,
    };
  } catch(e) {
    return { despesas: DEFAULT_DESPESAS, receitas: DEFAULT_RECEITAS, investimentos: DEFAULT_INVESTIMENTOS };
  }
}

const savedData = loadData();

let state = {
  tab: 'dashboard',
  toast: null,
  showModal: null,
  editId: null,
  filtro: 'todas',
  despesas:      savedData.despesas,
  receitas:      savedData.receitas,
  investimentos: savedData.investimentos,
  form: {},
};

// ─── Render engine ───────────────────────────────────────────────────────────
function render() {
  const el = document.getElementById('app');
  el.innerHTML = buildApp();
  bindEvents();
}

function setState(patch) {
  Object.assign(state, patch);
  saveData();
  render();
}

// ─── Builders ────────────────────────────────────────────────────────────────
function buildApp() {
  const {despesas,receitas,investimentos,tab} = state;
  const totRec = receitas.reduce((s,r)=>s+r.valor,0);
  const totDesp = despesas.reduce((s,d)=>s+d.valor,0);
  const saldo = totRec - totDesp;
  const saldoColor = saldo>=0?'#4ade80':'#f87171';

  return `
  <div class="app">
    ${state.toast ? `<div class="toast">${state.toast}</div>` : ''}
    ${state.showModal ? buildModal() : ''}

    <div class="header">
      <div class="header-left">
        <div class="avatar">VH</div>
        <div>
          <h1>Victor Hugo</h1>
          <p>Perfil Principal</p>
        </div>
      </div>
      <div class="header-icons">
        <button class="save-btn ${state.justSaved?'saved':''}" id="save-btn-manual">
          <span class="save-dot ${state.justSaved?'ok':''}"></span>
          ${state.justSaved ? '✓ Salvo' : '💾'}
        </button>
        <button class="icon-btn">🔔</button>
      </div>
    </div>

    <div class="main">
      ${tab==='dashboard'    ? buildDashboard() : ''}
      ${tab==='ranking'      ? buildRanking()   : ''}
      ${tab==='despesas'     ? buildDespesas()  : ''}
      ${tab==='fixas'        ? buildFixas()     : ''}
      ${tab==='receitas'     ? buildReceitas()  : ''}
      ${tab==='investimentos'? buildInvest()    : ''}
    </div>

    <nav class="bottom-nav">
      ${[['dashboard','📊','Início'],['ranking','🏆','Ranking'],['despesas','📋','Despesas'],
         ['fixas','📌','Fixas'],['receitas','💵','Receitas'],['investimentos','📈','Invest.']
        ].map(([id,icon,label])=>`
        <button class="nav-btn" data-tab="${id}" style="color:${tab===id?'#3b82f6':'#94a3b8'}">
          <span class="nav-icon">${icon}</span>
          <span class="nav-label" style="font-weight:${tab===id?800:500}">${label}</span>
          ${tab===id?'<span class="nav-dot"></span>':''}
        </button>`).join('')}
    </nav>
  </div>`;
}

function daysBadge(venc) {
  if(!venc) return '';
  const d = daysUntil(venc);
  const color = d<0?'#ef4444':d<=3?'#f97316':d<=7?'#eab308':'#94a3b8';
  const label = d<0?`${Math.abs(d)}d atrasado`:d===0?'Hoje':`${d}d`;
  return `<span class="days-badge" style="color:${color}">${label}</span>`;
}

function priorityBadge(p) {
  const c = PRIORITY[p];
  return `<span class="badge" style="background:${c.bg};color:${c.color};border-color:${c.border}">${c.icon} ${c.label}</span>`;
}

function fixaBadge() {
  return `<span class="badge badge-fixa">📌 Fixa</span>`;
}

function buildDashboard() {
  const {despesas,receitas,investimentos} = state;
  const totRec = receitas.reduce((s,r)=>s+r.valor,0);
  const totDesp = despesas.reduce((s,d)=>s+d.valor,0);
  const totFixas = despesas.filter(d=>d.fixa).reduce((s,d)=>s+d.valor,0);
  const totVar = despesas.filter(d=>!d.fixa).reduce((s,d)=>s+d.valor,0);
  const saldo = totRec-totDesp;
  const pagas = despesas.filter(d=>d.pago).length;
  const totPago = despesas.filter(d=>d.pago).reduce((s,d)=>s+d.valor,0);
  const totPend = despesas.filter(d=>!d.pago).reduce((s,d)=>s+d.valor,0);
  const totInv = investimentos.reduce((s,i)=>s+i.aporte,0);

  // Gráfico de despesas por dia (simulado com dados reais)
  const meses = ['Jan','Fev','Mar','Abr','Mai','Jun','Jul','Ago','Set','Out','Nov','Dez'];
  const mesAtual = meses[new Date().getMonth()];

  // Gera pontos do gráfico baseado nas despesas reais
  const chartData = [];
  for(let d=1;d<=31;d++){
    const val = despesas
      .filter(dep=>dep.vencimento && new Date(dep.vencimento+'T12:00:00').getDate()===d)
      .reduce((s,dep)=>s+dep.valor,0);
    chartData.push(val);
  }
  const maxVal = Math.max(...chartData, 100);

  // Build SVG sparkline
  const W=320, H=90, PAD=8;
  const pts = chartData.map((v,i)=>{
    const x = PAD + (i/(30))*(W-PAD*2);
    const y = H - PAD - (v/maxVal)*(H-PAD*2);
    return `${x},${y}`;
  }).join(' ');

function buildRanking() {
  const {despesas,receitas} = state;
  const totRec = receitas.reduce((s,r)=>s+r.valor,0);
  const ranking = [...despesas].filter(d=>!d.pago).sort((a,b)=>{
    const po=PRIORITY[a.prioridade].order-PRIORITY[b.prioridade].order;
    if(po!==0) return po;
    return (a.vencimento||'9999').localeCompare(b.vencimento||'9999');
  });
  let bal = totRec;
  const withBal = ranking.map(d=>{bal-=d.valor;return {...d,balAfter:bal}});
  const pagas = despesas.filter(d=>d.pago);

  return `
  <div class="flex-between" style="margin-bottom:16px">
    <div>
      <div class="section-title">🏆 Ranking de Pagamento</div>
      <div class="section-sub">Prioridade → Vencimento</div>

  </div>

  ${withBal.length===0?`<div class="card" style="text-align:center;padding:40px;color:#94a3b8">🎉 Todas pagas!</div>`:''}

  ${withBal.map((d,i)=>`
  <div class="rank-item" style="background:${i===0?'#eff6ff':'#fff'};border-color:${i===0?'#bfdbfe':'#f1f5f9'}">
    <div class="rank-num" style="background:${i===0?'#3b82f6':i===1?'#64748b':'#e2e8f0'};color:${i<2?'#fff':'#64748b'}">${i+1}</div>
    <div style="flex:1;min-width:0">
      <div style="display:flex;gap:6px;align-items:center;flex-wrap:wrap">
        <span style="font-weight:700;font-size:15px">${d.nome}</span>
        ${d.fixa?fixaBadge():''}

      <div style="font-size:12px;color:#94a3b8;margin-top:2px">${d.categoria} · ${fmtDate(d.vencimento)} ${daysBadge(d.vencimento)}</div>

      <button class="btn btn-success btn-sm" data-action="pagar" data-id="${d.id}">✓ Pagar</button>
    </div>
  </div>`).join('')}

  ${pagas.length>0?`
  <div style="margin-top:16px">
    <div style="font-size:13px;font-weight:700;color:#94a3b8;margin-bottom:8px">✅ Já Pagas</div>

        <span style="font-weight:600;text-decoration:line-through;color:#64748b">${d.nome}</span>
        ${d.fixa?fixaBadge():''}
      </div>
      <span style="font-weight:700;color:#22c55e">${fmt(d.valor)}</span>
      <button class="btn btn-ghost btn-sm" data-action="unpagar" data-id="${d.id}">↩</button>

  ${investimentos.map(inv=>{

    </div>`;
  }).join('')}

  ${investimentos.length>0?`<div style="margin-top:8px;padding:10px 14px;background:#fff7ed;border-radius:10px;border:1px solid #fed7aa;font-size:12px;color:#92400e">⚠️ Rendimentos estimados. Consulte sua instituição para valores exatos.</div>`:''}`;
}

// ─── Events ───────────────────────────────────────────────────────────────────
function bindEvents() {
  document.querySelectorAll('[data-tab]').forEach(el=>{
    el.addEventListener('click',()=>setState({tab:el.dataset.tab}));
  });
  document.querySelectorAll('[data-filtro]').forEach(el=>{
    el.addEventListener('click',()=>setState({filtro:el.dataset.filtro}));
  });

  const act = (sel,fn) => { const el=document.querySelector(sel); if(el) el.addEventListener('click',fn); };
  const acts = (sel,fn) => document.querySelectorAll(sel).forEach(el=>el.addEventListener('click',fn));

  // Botão salvar manual
  act('#save-btn-manual', () => manualSave());

  // Overlay close
  act('#modal-overlay',e=>{ if(e.target.id==='modal-overlay') setState({showModal:null,form:{},editId:null}); });
  acts('[data-action="close-modal"]',()=>setState({showModal:null,form:{},editId:null}));

  // Open modals
  acts('[data-action="modal-despesa"]',()=>setState({showModal:'despesa',form:{},editId:null}));
  acts('[data-action="modal-fixa"]',()=>setState({showModal:'fixa',form:{fixa:true},editId:null}));
  acts('[data-action="modal-receita"]',()=>setState({showModal:'receita',form:{},editId:null}));
  acts('[data-action="modal-invest"]',()=>setState({showModal:'investimento',form:{},editId:null}));
  acts('[data-action="comprovante"]',()=>setState({showModal:'comprovante',form:{}}));

  // Toggle fixa
  act('#toggle-fixa',()=>{
    const fixa=!state.form.fixa;
    setState({form:{...state.form,fixa},showModal:fixa?'fixa':'despesa'});
  });

  // Save despesa
  acts('[data-action="save-despesa"]',()=>{
    const nome=document.getElementById('f-nome')?.value.trim();
    const valor=parseFloat(document.getElementById('f-valor')?.value);
    if(!nome||!valor) return;
    const fixa=!!state.form.fixa;
    const prioridade=document.getElementById('f-prio')?.value||'moderado';
    const categoria=document.getElementById('f-cat')?.value.trim()||'';
    const vencimento=fixa?'':document.getElementById('f-venc')?.value||'';
    const diaVenc=fixa?parseInt(document.getElementById('f-dia')?.value)||'':'';
    const newD={nome,valor,prioridade,categoria,fixa,vencimento,diaVenc,pago:false};
    if(state.editId) {
      setState({despesas:state.despesas.map(d=>d.id===state.editId?{...d,...newD}:d),showModal:null,form:{},editId:null});
    } else {
      setState({despesas:[...state.despesas,{...newD,id:Date.now()}],showModal:null,form:{},editId:null});
    }
  });

  // Save receita
  acts('[data-action="save-receita"]',()=>{
    const nome=document.getElementById('f-nome')?.value.trim();
    const valor=parseFloat(document.getElementById('f-valor')?.value);
    if(!nome||!valor) return;
    const data=document.getElementById('f-data')?.value||'';
    const recorrente=document.getElementById('f-rec')?.checked||false;
    const newR={nome,valor,data,recorrente};
    if(state.editId) {
      setState({receitas:state.receitas.map(r=>r.id===state.editId?{...r,...newR}:r),showModal:null,form:{},editId:null});
    } else {
      setState({receitas:[...state.receitas,{...newR,id:Date.now()}],showModal:null,form:{},editId:null});
    }
  });

  // Save invest
  acts('[data-action="save-invest"]',()=>{
    const nome=document.getElementById('f-nome')?.value.trim();
    const aporte=parseFloat(document.getElementById('f-aporte')?.value);
    const inicio=document.getElementById('f-inicio')?.value;
    if(!nome||!aporte||!inicio) return;
    const tipo=document.getElementById('f-tipo')?.value||'cdb';
    const taxaRaw=document.getElementById('f-taxa')?.value;
    const taxaCustom=taxaRaw?parseFloat(taxaRaw)/100:null;
    const newI={nome,aporte,inicio,tipo,taxaCustom};
    if(state.editId) {
      setState({investimentos:state.investimentos.map(i=>i.id===state.editId?{...i,...newI}:i),showModal:null,form:{},editId:null});
    } else {
      setState({investimentos:[...state.investimentos,{...newI,id:Date.now()}],showModal:null,form:{},editId:null});
    }
  });

  // Pagar / unpagar
  acts('[data-action="pagar"]',e=>{ const id=parseInt(e.currentTarget.dataset.id); setState({despesas:state.despesas.map(d=>d.id===id?{...d,pago:true}:d)}); });
  acts('[data-action="unpagar"]',e=>{ const id=parseInt(e.currentTarget.dataset.id); setState({despesas:state.despesas.map(d=>d.id===id?{...d,pago:false}:d)}); });
  acts('[data-action="toggle"]',e=>{ const id=parseInt(e.currentTarget.dataset.id); setState({despesas:state.despesas.map(d=>d.id===id?{...d,pago:!d.pago}:d)}); });

  // Delete
  acts('[data-action="del-despesa"]',e=>{ const id=parseInt(e.currentTarget.dataset.id); setState({despesas:state.despesas.filter(d=>d.id!==id)}); });
  acts('[data-action="del-receita"]',e=>{ const id=parseInt(e.currentTarget.dataset.id); setState({receitas:state.receitas.filter(r=>r.id!==id)}); });
  acts('[data-action="del-invest"]',e=>{ const id=parseInt(e.currentTarget.dataset.id); setState({investimentos:state.investimentos.filter(i=>i.id!==id)}); });

  // Edit despesa
  acts('[data-action="edit-despesa"]',e=>{
    const id=parseInt(e.currentTarget.dataset.id);
    const d=state.despesas.find(x=>x.id===id);
    if(d) setState({showModal:d.fixa?'fixa':'despesa',form:{...d},editId:id});
  });

  // Edit receita
  acts('[data-action="edit-receita"]',e=>{
    const id=parseInt(e.currentTarget.dataset.id);
    const r=state.receitas.find(x=>x.id===id);
    if(r) setState({showModal:'receita',form:{...r},editId:id});
  });

  // Edit invest
  acts('[data-action="edit-invest"]',e=>{
    const id=parseInt(e.currentTarget.dataset.id);
    const inv=state.investimentos.find(x=>x.id===id);
    if(inv) setState({showModal:'investimento',form:{...inv},editId:id});
  });

  // Comprovante file
  const fileInput=document.getElementById('comp-file');
  if(fileInput) fileInput.addEventListener('change',handleComprovante);

  // Start tickers
  startTickers();
}

// ─── Tickers ─────────────────────────────────────────────────────────────────
let tickerInterval = null;
function startTickers() {
  if(tickerInterval) clearInterval(tickerInterval);
  tickerInterval = setInterval(()=>{
    const {investimentos} = state;
    let totRend = 0;
    investimentos.forEach(inv=>{
      const tipo=TIPOS_INV[inv.tipo]||TIPOS_INV.outro;
      const taxa=inv.taxaCustom||tipo.taxa;
      const ra=rendAcum(inv.aporte,taxa,inv.inicio);
      totRend+=ra;
      const el=document.getElementById(`ticker-${inv.id}`);
      if(el) el.textContent=fmt(ra + rps(inv.aporte,taxa)*Date.now()/1000 - rps(inv.aporte,taxa)*Date.now()/1000);
      // simpler: just increment
      if(el) {
        const cur=parseFloat(el.dataset.val||ra);
        const next=cur+rps(inv.aporte,taxa)*0.1;
        el.dataset.val=next;
        el.textContent=fmt(next);
      }
    });
    const totEl=document.getElementById('ticker-total');
    if(totEl){
      const cur=parseFloat(totEl.dataset.val||totRend);
      const totalRps=investimentos.reduce((s,inv)=>{
        const taxa=(inv.taxaCustom)||(TIPOS_INV[inv.tipo]||TIPOS_INV.outro).taxa;
        return s+rps(inv.aporte,taxa);
      },0);
      const next=cur+totalRps*0.1;
      totEl.dataset.val=next;
      totEl.textContent=fmt(next);
    }
    const dashEl=document.getElementById('ticker-dash');
    if(dashEl){
      const cur=parseFloat(dashEl.dataset.val||totRend);
      const totalRps=investimentos.reduce((s,inv)=>{
        const taxa=(inv.taxaCustom)||(TIPOS_INV[inv.tipo]||TIPOS_INV.outro).taxa;
        return s+rps(inv.aporte,taxa);
      },0);
      const next=cur+totalRps*0.1;
      dashEl.dataset.val=next;
      dashEl.textContent=fmt(next);
    }
  },100);
}

// ─── Comprovante IA ───────────────────────────────────────────────────────────
async function handleComprovante(e) {
  const file = e.target.files[0];
  if(!file) return;
  const area = document.getElementById('comp-area');
  const result = document.getElementById('comp-result');
  area.innerHTML='<div style="font-size:32px;margin-bottom:12px">🔍</div><div style="font-weight:700">Analisando comprovante...</div><div style="font-size:13px;color:#94a3b8;margin-top:4px">A IA está lendo o comprovante</div>';
  result.style.display='none';

  const reader=new FileReader();
  reader.onload=async ev=>{
    const b64=ev.target.result.split(',')[1];
    const mediaType=file.type;
    const pendentes=state.despesas.filter(d=>!d.pago).map(d=>`ID ${d.id}: ${d.nome} (${fmt(d.valor)})`).join(', ');
    try {
      const res=await fetch('https://api.anthropic.com/v1/messages',{
        method:'POST',
        headers:{'Content-Type':'application/json'},
        body:JSON.stringify({
          model:'claude-sonnet-4-20250514',
          max_tokens:800,
          messages:[{role:'user',content:[
            {type:'image',source:{type:'base64',media_type:mediaType,data:b64}},
            {type:'text',text:`Analise este comprovante. Despesas pendentes: ${pendentes}. Retorne apenas JSON: {"beneficiario":"...","valor":0,"data":"DD/MM/AAAA","tipo":"...","despesaIdMatch":null,"confianca":"alta","motivo":"..."}`}
          ]}]
        })
      });
      const data=await res.json();
      const text=data.content?.map(b=>b.text||'').join('').replace(/```json|```/g,'').trim();
      const parsed=JSON.parse(text);
      const matched=parsed.despesaIdMatch?state.despesas.find(d=>d.id===parsed.despesaIdMatch):null;

      result.style.display='block';
      result.innerHTML=`
      <div style="background:#f8fafc;border-radius:12px;padding:14px;margin-bottom:12px">
        <div style="font-size:11px;font-weight:700;color:#94a3b8;margin-bottom:8px;text-transform:uppercase">Dados extraídos</div>
        <div style="display:flex;justify-content:space-between;padding:6px 0;border-bottom:1px solid #f1f5f9"><span style="color:#64748b">Beneficiário</span><span style="font-weight:700">${parsed.beneficiario||'—'}</span></div>
        <div style="display:flex;justify-content:space-between;padding:6px 0;border-bottom:1px solid #f1f5f9"><span style="color:#64748b">Valor</span><span style="font-weight:800">${parsed.valor?fmt(parsed.valor):'—'}</span></div>
        <div style="display:flex;justify-content:space-between;padding:6px 0"><span style="color:#64748b">Data</span><span style="font-weight:700">${parsed.data||'—'}</span></div>
      </div>
      ${matched?`
      <div style="background:#f0fdf4;border:1.5px solid #86efac;border-radius:12px;padding:14px;margin-bottom:12px">
        <div style="font-size:12px;font-weight:700;color:#16a34a;margin-bottom:6px">✅ Despesa identificada</div>
        <div style="display:flex;justify-content:space-between;align-items:center">
          <div>
            <div style="font-weight:800">${matched.nome}</div>
            <div style="font-size:12px;color:#64748b">${parsed.motivo}</div>
          </div>
          <span style="font-weight:800;color:#16a34a">${fmt(matched.valor)}</span>
        </div>
        <button class="btn btn-success" style="width:100%;margin-top:10px" data-action="comp-confirm" data-id="${matched.id}">✅ Marcar como paga</button>
      </div>`:`
      <div style="background:#fff7ed;border:1.5px solid #fed7aa;border-radius:12px;padding:14px;margin-bottom:12px">
        <div style="font-size:13px;font-weight:700;color:#ea580c;margin-bottom:4px">⚠️ Despesa não identificada</div>
        <div style="font-size:13px;color:#64748b;margin-bottom:10px">${parsed.motivo||'Selecione manualmente:'}</div>
        <select class="form-select" id="comp-select">
          <option value="">— Selecione —</option>
          ${state.despesas.filter(d=>!d.pago).map(d=>`<option value="${d.id}">${d.nome} — ${fmt(d.valor)}</option>`).join('')}
        </select>
        <button class="btn btn-success" style="width:100%;margin-top:10px" id="comp-manual-btn">✅ Marcar como paga</button>
      </div>`}`;

      // Bind confirm buttons
      const confirmBtn=result.querySelector('[data-action="comp-confirm"]');
      if(confirmBtn) confirmBtn.addEventListener('click',()=>{
        const id=parseInt(confirmBtn.dataset.id);
        const d=state.despesas.find(x=>x.id===id);
        setState({despesas:state.despesas.map(x=>x.id===id?{...x,pago:true}:x),showModal:null,form:{},toast:`✅ "${d?.nome}" marcada como paga!`});
        setTimeout(()=>setState({toast:null}),3000);
      });
      const manualBtn=result.querySelector('#comp-manual-btn');
      if(manualBtn) manualBtn.addEventListener('click',()=>{
        const id=parseInt(document.getElementById('comp-select')?.value);
        if(!id) return;
        const d=state.despesas.find(x=>x.id===id);
        setState({despesas:state.despesas.map(x=>x.id===id?{...x,pago:true}:x),showModal:null,form:{},toast:`✅ "${d?.nome}" marcada como paga!`});
        setTimeout(()=>setState({toast:null}),3000);
      });

    } catch(err) {
      area.innerHTML='<div style="color:#ef4444;font-weight:700">❌ Erro ao analisar. Tente novamente.</div>';
    }
  };
  reader.readAsDataURL(file);
}

// ─── Boot ─────────────────────────────────────────────────────────────────────
state.justSaved = false;
render();

if('serviceWorker' in navigator) navigator.serviceWorker.register('sw.js').catch(()=>{});
