const PRIORITY_CONFIG = {
  essencial: { label: "Essencial", color: "#ef4444", bg: "#fef2f2", border: "#fecaca", icon: "🔴", order: 1 },
  importante: { label: "Importante", color: "#f97316", bg: "#fff7ed", border: "#fed7aa", icon: "🟠", order: 2 },
  moderado: { label: "Moderado", color: "#eab308", bg: "#fefce8", border: "#fef08a", icon: "🟡", order: 3 },
  baixo: { label: "Baixo", color: "#22c55e", bg: "#f0fdf4", border: "#bbf7d0", icon: "🟢", order: 4 },
};

const fmt = (v) => v.toLocaleString("pt-BR", { style: "currency", currency: "BRL" });
const fmtDate = (d) => d ? new Date(d + "T12:00:00").toLocaleDateString("pt-BR") : "—";

const daysUntil = (dateStr) => {
  if (!dateStr) return null;
  const diff = new Date(dateStr + "T12:00:00") - new Date(new Date().toDateString());
  return Math.ceil(diff / 86400000);
};

function Badge({ priority }) {
  const c = PRIORITY_CONFIG[priority];
  return (
    <span style={{ background: c.bg, color: c.color, border: `1px solid ${c.border}`, borderRadius: 20, padding: "2px 10px", fontSize: 12, fontWeight: 700, fontFamily: "inherit" }}>
      {c.icon} {c.label}
    </span>
  );
}

function FixaBadge() {
  return (
    <span style={{ background: "#ede9fe", color: "#7c3aed", border: "1px solid #c4b5fd", borderRadius: 20, padding: "2px 10px", fontSize: 11, fontWeight: 700 }}>
      📌 Fixa
    </span>
  );
}

function DaysBadge({ dateStr }) {
  const d = daysUntil(dateStr);
  if (d === null) return null;
  const color = d < 0 ? "#ef4444" : d <= 3 ? "#f97316" : d <= 7 ? "#eab308" : "#64748b";
  const label = d < 0 ? `${Math.abs(d)}d atrasado` : d === 0 ? "Vence hoje" : `${d}d`;
  return <span style={{ color, fontSize: 11, fontWeight: 700 }}>{label}</span>;
}

// ── Comprovante Modal ──────────────────────────────────────────────────────────
function ComprovanteModal({ despesas, onClose, onConfirm }) {
  const [stage, setStage] = useState("upload"); // upload | analyzing | result | confirm
  const [imagePreview, setImagePreview] = useState(null);
  const [imageBase64, setImageBase64] = useState(null);
  const [imageType, setImageType] = useState("image/jpeg");
  const [result, setResult] = useState(null);
  const [matchedId, setMatchedId] = useState(null);
  const [error, setError] = useState(null);
  const [dragging, setDragging] = useState(false);
  const fileRef = useRef();

  const handleFile = (file) => {
    if (!file || !file.type.startsWith("image/")) return;
    setImageType(file.type);
    const reader = new FileReader();
    reader.onload = (e) => {
      setImagePreview(e.target.result);
      setImageBase64(e.target.result.split(",")[1]);
    };
    reader.readAsDataURL(file);
  };

  const analyze = async () => {
    if (!imageBase64) return;
    setStage("analyzing");
    setError(null);

    const despesasNomes = despesas.filter(d => !d.pago).map(d => `ID ${d.id}: ${d.nome} (${fmt(d.valor)})`).join(", ");

    try {
      const res = await fetch("https://api.anthropic.com/v1/messages", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
          model: "claude-sonnet-4-20250514",
          max_tokens: 1000,
          messages: [{
            role: "user",
            content: [
              {
                type: "image",
                source: { type: "base64", media_type: imageType, data: imageBase64 }
              },
              {
                type: "text",
                text: `Você é um assistente de finanças pessoais. Analise este comprovante de pagamento e extraia as informações.

Despesas pendentes no app: ${despesasNomes}

Retorne APENAS um JSON válido, sem texto antes ou depois, sem marcação markdown:
{
  "beneficiario": "nome do beneficiário/empresa que recebeu o pagamento",
  "valor": 0.00,
  "data": "DD/MM/AAAA",
  "tipo": "tipo do pagamento (PIX, boleto, débito, etc)",
  "descricao": "descrição curta do que foi pago",
  "despesaIdMatch": null,
  "confianca": "alta|media|baixa",
  "motivo": "explicação breve de qual despesa foi identificada ou por que não foi possível identificar"
}

Para despesaIdMatch: compare o beneficiário e valor do comprovante com as despesas listadas. Se encontrar correspondência, coloque o ID numérico. Se não encontrar, coloque null.
Se a imagem não for um comprovante de pagamento, retorne: {"erro": "Imagem não reconhecida como comprovante de pagamento"}`
              }
            ]
          }]
        })
      });

      const data = await res.json();
      const text = data.content?.map(b => b.text || "").join("").trim();
      const clean = text.replace(/```json|```/g, "").trim();
      const parsed = JSON.parse(clean);

      if (parsed.erro) { setError(parsed.erro); setStage("upload"); return; }

      setResult(parsed);
      setMatchedId(parsed.despesaIdMatch || null);
      setStage("result");
    } catch (e) {
      setError("Erro ao analisar o comprovante. Tente novamente.");
      setStage("upload");
    }
  };

  const S = {
    overlay: { position: "fixed", inset: 0, background: "rgba(15,23,42,0.7)", zIndex: 1000, display: "flex", alignItems: "center", justifyContent: "center", padding: 16 },
    modal: { background: "#fff", borderRadius: 20, width: "100%", maxWidth: 500, maxHeight: "90vh", overflowY: "auto", boxShadow: "0 25px 60px rgba(0,0,0,0.3)" },
    header: { padding: "20px 24px 0", display: "flex", justifyContent: "space-between", alignItems: "center" },
    body: { padding: "16px 24px 24px" },
    dropzone: (drag) => ({ border: `2px dashed ${drag ? "#3b82f6" : "#e2e8f0"}`, borderRadius: 14, padding: "32px 24px", textAlign: "center", background: drag ? "#eff6ff" : "#f8fafc", cursor: "pointer", transition: "all .2s" }),
    btn: (v = "primary") => ({ background: v === "primary" ? "#3b82f6" : v === "success" ? "#22c55e" : v === "danger" ? "#ef4444" : "#f1f5f9", color: ["primary","success","danger"].includes(v) ? "#fff" : "#475569", border: "none", borderRadius: 9, padding: "10px 20px", fontSize: 14, fontWeight: 700, cursor: "pointer", fontFamily: "inherit" }),
    infoRow: { display: "flex", justifyContent: "space-between", padding: "8px 0", borderBottom: "1px solid #f1f5f9", fontSize: 14 },
  };

  const matchedDespesa = matchedId ? despesas.find(d => d.id === matchedId) : null;

  return (
    <div style={S.overlay} onClick={e => e.target === e.currentTarget && onClose()}>
      <div style={S.modal}>
        <div style={S.header}>
          <h2 style={{ margin: 0, fontSize: 17, fontWeight: 800 }}>📄 Comprovante de Pagamento</h2>
          <button onClick={onClose} style={{ background: "none", border: "none", fontSize: 20, cursor: "pointer", color: "#94a3b8" }}>✕</button>
        </div>
        <div style={S.body}>

          {/* UPLOAD */}
          {(stage === "upload") && (
            <>
              {error && <div style={{ background: "#fef2f2", border: "1px solid #fecaca", borderRadius: 10, padding: "10px 14px", marginBottom: 12, color: "#ef4444", fontSize: 13 }}>⚠️ {error}</div>}

              <div
                style={S.dropzone(dragging)}
                onClick={() => fileRef.current.click()}
                onDragOver={e => { e.preventDefault(); setDragging(true); }}
                onDragLeave={() => setDragging(false)}
                onDrop={e => { e.preventDefault(); setDragging(false); handleFile(e.dataTransfer.files[0]); }}
              >
                {imagePreview ? (
                  <img src={imagePreview} alt="comprovante" style={{ maxWidth: "100%", maxHeight: 200, borderRadius: 10, objectFit: "contain" }} />
                ) : (
                  <>
                    <div style={{ fontSize: 40, marginBottom: 10 }}>🧾</div>
                    <div style={{ fontWeight: 700, fontSize: 15, marginBottom: 4 }}>Arraste ou clique para enviar</div>
                    <div style={{ fontSize: 13, color: "#94a3b8" }}>Foto ou print do comprovante (PIX, boleto, recibo...)</div>
                  </>
                )}
                <input ref={fileRef} type="file" accept="image/*" style={{ display: "none" }} onChange={e => handleFile(e.target.files[0])} />
              </div>

              {imagePreview && (
                <div style={{ marginTop: 12, display: "flex", gap: 8 }}>
                  <button style={S.btn("primary")} onClick={analyze}>🔍 Analisar Comprovante</button>
                  <button style={S.btn()} onClick={() => { setImagePreview(null); setImageBase64(null); }}>Trocar imagem</button>
                </div>
              )}
            </>
          )}

          {/* ANALYZING */}
          {stage === "analyzing" && (
            <div style={{ textAlign: "center", padding: "32px 0" }}>
              <div style={{ fontSize: 48, marginBottom: 16, animation: "spin 1.5s linear infinite", display: "inline-block" }}>🔍</div>
              <style>{`@keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }`}</style>
              <div style={{ fontWeight: 700, fontSize: 16, marginBottom: 6 }}>Analisando comprovante...</div>
              <div style={{ fontSize: 13, color: "#94a3b8" }}>A IA está lendo o comprovante e identificando a despesa</div>
            </div>
          )}

          {/* RESULT */}
          {stage === "result" && result && (
            <>
              {imagePreview && <img src={imagePreview} alt="comprovante" style={{ width: "100%", maxHeight: 140, objectFit: "cover", borderRadius: 10, marginBottom: 14 }} />}

              <div style={{ background: "#f8fafc", borderRadius: 12, padding: "14px 16px", marginBottom: 14 }}>
                <div style={{ fontSize: 12, fontWeight: 700, color: "#94a3b8", marginBottom: 8, textTransform: "uppercase", letterSpacing: 1 }}>Dados extraídos do comprovante</div>
                <div style={S.infoRow}><span style={{ color: "#64748b" }}>Beneficiário</span><span style={{ fontWeight: 700 }}>{result.beneficiario || "—"}</span></div>
                <div style={S.infoRow}><span style={{ color: "#64748b" }}>Valor</span><span style={{ fontWeight: 800, color: "#1e293b" }}>{result.valor ? fmt(result.valor) : "—"}</span></div>
                <div style={S.infoRow}><span style={{ color: "#64748b" }}>Data</span><span style={{ fontWeight: 700 }}>{result.data || "—"}</span></div>
                <div style={{ ...S.infoRow, borderBottom: "none" }}><span style={{ color: "#64748b" }}>Tipo</span><span style={{ fontWeight: 700 }}>{result.tipo || "—"}</span></div>
              </div>

              {matchedDespesa ? (
                <div style={{ background: "#f0fdf4", border: "1.5px solid #86efac", borderRadius: 12, padding: "14px 16px", marginBottom: 14 }}>
                  <div style={{ fontSize: 12, fontWeight: 700, color: "#16a34a", marginBottom: 6 }}>✅ Despesa identificada</div>
                  <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center" }}>
                    <div>
                      <div style={{ fontWeight: 800, fontSize: 15 }}>{matchedDespesa.nome}</div>
                      <div style={{ fontSize: 12, color: "#64748b", marginTop: 2 }}>{result.motivo}</div>
                    </div>
                    <div style={{ textAlign: "right" }}>
                      <div style={{ fontWeight: 800, color: "#16a34a" }}>{fmt(matchedDespesa.valor)}</div>
                      <div style={{ fontSize: 11 }}><Badge priority={matchedDespesa.prioridade} /></div>
                    </div>
                  </div>
                  <div style={{ marginTop: 4, fontSize: 12 }}>
                    Confiança: <span style={{ fontWeight: 700, color: result.confianca === "alta" ? "#22c55e" : result.confianca === "media" ? "#f97316" : "#ef4444" }}>{result.confianca}</span>
                  </div>
                </div>
              ) : (
                <div style={{ background: "#fff7ed", border: "1.5px solid #fed7aa", borderRadius: 12, padding: "14px 16px", marginBottom: 14 }}>
                  <div style={{ fontSize: 13, fontWeight: 700, color: "#ea580c", marginBottom: 4 }}>⚠️ Nenhuma despesa correspondente encontrada</div>
                  <div style={{ fontSize: 13, color: "#64748b" }}>{result.motivo || "Não foi possível vincular este comprovante a uma despesa cadastrada."}</div>
                  <div style={{ marginTop: 10 }}>
                    <div style={{ fontSize: 12, fontWeight: 600, color: "#64748b", marginBottom: 6 }}>Selecionar manualmente:</div>
                    <select style={{ width: "100%", border: "1px solid #e2e8f0", borderRadius: 8, padding: "8px 10px", fontSize: 13, fontFamily: "inherit" }}
                      onChange={e => setMatchedId(e.target.value ? parseInt(e.target.value) : null)}
                      value={matchedId || ""}>
                      <option value="">— Selecione a despesa —</option>
                      {despesas.filter(d => !d.pago).map(d => (
                        <option key={d.id} value={d.id}>{d.nome} — {fmt(d.valor)}</option>
                      ))}
                    </select>
                  </div>
                </div>
              )}

              <div style={{ display: "flex", gap: 8, flexWrap: "wrap" }}>
                {matchedId && (
                  <button style={S.btn("success")} onClick={() => onConfirm(matchedId)}>
                    ✅ Marcar como paga
                  </button>
                )}
                <button style={S.btn()} onClick={() => { setStage("upload"); setResult(null); setMatchedId(null); }}>
                  🔄 Novo comprovante
                </button>
                <button style={S.btn()} onClick={onClose}>Cancelar</button>
              </div>
            </>
          )}
        </div>
      </div>
    </div>
  );
}

// rendimento acumulado desde dataInicio até agora em segundos
function rendimentoAtual(valorAportado, taxaAnual, dataInicio) {
  const msInicio = new Date(dataInicio + "T00:00:00").getTime();
  const msAgora  = Date.now();
  const anos     = (msAgora - msInicio) / (1000 * 60 * 60 * 24 * 365.25);
  if (anos <= 0) return 0;
  return valorAportado * (Math.pow(1 + taxaAnual, anos) - 1);
}

// rendimento por segundo (para o ticker)
function rendPorSegundo(valorAportado, taxaAnual) {
  return valorAportado * taxaAnual / (365.25 * 24 * 3600);
}

const INITIAL_INV = [
  { id: 1, nome: "CDB Nubank 120% CDI", tipo: "cdb",     aporte: 10000, dataInicio: "2025-01-10", taxaPersonalizada: null },
  { id: 2, nome: "Tesouro Selic 2029",  tipo: "tesouro", aporte: 5000,  dataInicio: "2024-06-01", taxaPersonalizada: null },

];

// ── Componente ticker de rendimento em tempo real ─────────────────────────────
function TickerRend({ valorAportado, taxaAnual, dataInicio }) {
  const [rend, setRend] = useState(() => rendimentoAtual(valorAportado, taxaAnual, dataInicio));
  useEffect(() => {
    const rps = rendPorSegundo(valorAportado, taxaAnual);
    const id = setInterval(() => setRend(r => r + rps / 10), 100); // atualiza 10x/s
    return () => clearInterval(id);
  }, [valorAportado, taxaAnual, dataInicio]);
  return <span style={{ fontVariantNumeric: "tabular-nums" }}>{fmt(rend)}</span>;
}


// ── Ticker total de rendimentos (soma de todos) ───────────────────────────────
function TickerTotalRend({ investimentos, taxaEfetiva }) {
  const calcTotal = () => investimentos.reduce((s, inv) => s + rendimentoAtual(inv.aporte, taxaEfetiva(inv), inv.dataInicio), 0);
  const [total, setTotal] = useState(calcTotal);
  useEffect(() => {
    const rpsTotal = investimentos.reduce((s, inv) => s + rendPorSegundo(inv.aporte, taxaEfetiva(inv)), 0);
    const id = setInterval(() => setTotal(t => t + rpsTotal / 10), 100);
    return () => clearInterval(id);
  }, [investimentos]);
  return <span style={{ fontVariantNumeric: "tabular-nums" }}>{fmt(total)}</span>;
}

// ── Ticker patrimônio total (aporte + rendimento) ─────────────────────────────
function TickerPatrimonio({ investimentos, taxaEfetiva, totalAportado }) {
  const calcTotal = () => totalAportado + investimentos.reduce((s, inv) => s + rendimentoAtual(inv.aporte, taxaEfetiva(inv), inv.dataInicio), 0);
  const [total, setTotal] = useState(calcTotal);
  useEffect(() => {
    const rpsTotal = investimentos.reduce((s, inv) => s + rendPorSegundo(inv.aporte, taxaEfetiva(inv)), 0);
    const id = setInterval(() => setTotal(t => t + rpsTotal / 10), 100);
    return () => clearInterval(id);
  }, [investimentos, totalAportado]);
  return <span style={{ fontVariantNumeric: "tabular-nums" }}>{fmt(total)}</span>;
}

  const [receitas, setReceitas] = useState([
    { id: 1, nome: "Salário", valor: 5000, data: "2026-06-05", recorrente: true },
    { id: 2, nome: "Freelance", valor: 800, data: "2026-06-15", recorrente: false },
  ]);
  const [showComprovante, setShowComprovante] = useState(false);
  const [toastMsg, setToastMsg] = useState(null);
  const [investimentos, setInvestimentos] = useState(INITIAL_INV);
  const [showInvForm, setShowInvForm] = useState(false);
  const [editInvId, setEditInvId] = useState(null);
  const EMPTY_INV = { nome: "", tipo: "cdb", aporte: "", dataInicio: "", taxaPersonalizada: "" };
  const [novoInv, setNovoInv] = useState(EMPTY_INV);

  const EMPTY_DESPESA = { nome: "", valor: "", vencimento: "", prioridade: "moderado", categoria: "", fixa: false, diaVencimento: "" };
  const [novaDespesa, setNovaDespesa] = useState(EMPTY_DESPESA);
  const [novaReceita, setNovaReceita] = useState({ nome: "", valor: "", data: "", recorrente: false });
  const [showDespesaForm, setShowDespesaForm] = useState(false);
  const [showReceitaForm, setShowReceitaForm] = useState(false);
  const [editId, setEditId] = useState(null);
  const [filtroTipo, setFiltroTipo] = useState("todas");

  const showToast = (msg) => { setToastMsg(msg); setTimeout(() => setToastMsg(null), 3500); };

  const ranking = useMemo(() => [...despesas].filter(d => !d.pago).sort((a, b) => {
    const pa = PRIORITY_CONFIG[a.prioridade].order, pb = PRIORITY_CONFIG[b.prioridade].order;
    if (pa !== pb) return pa - pb;
    return (a.vencimento || "9999").localeCompare(b.vencimento || "9999");
  }), [despesas]);

  const totalReceitas = receitas.reduce((s, r) => s + r.valor, 0);
  const totalDespesas = despesas.reduce((s, d) => s + d.valor, 0);
  const totalFixas = despesas.filter(d => d.fixa).reduce((s, d) => s + d.valor, 0);
  const totalVariaveis = despesas.filter(d => !d.fixa).reduce((s, d) => s + d.valor, 0);
  const totalPago = despesas.filter(d => d.pago).reduce((s, d) => s + d.valor, 0);
  const totalPendente = despesas.filter(d => !d.pago).reduce((s, d) => s + d.valor, 0);
  const saldo = totalReceitas - totalDespesas;

  const addDespesa = () => {
    if (!novaDespesa.nome || !novaDespesa.valor) return;
    const base = { ...novaDespesa, valor: parseFloat(novaDespesa.valor), fixa: !!novaDespesa.fixa, diaVencimento: novaDespesa.fixa ? (parseInt(novaDespesa.diaVencimento) || "") : "" };
    if (editId) { setDespesas(despesas.map(d => d.id === editId ? { ...d, ...base } : d)); setEditId(null); }
    else setDespesas([...despesas, { ...base, id: Date.now(), pago: false }]);
    setNovaDespesa(EMPTY_DESPESA); setShowDespesaForm(false);
  };

  const addReceita = () => {
    if (!novaReceita.nome || !novaReceita.valor) return;
    setReceitas([...receitas, { ...novaReceita, id: Date.now(), valor: parseFloat(novaReceita.valor) }]);
    setNovaReceita({ nome: "", valor: "", data: "", recorrente: false }); setShowReceitaForm(false);
  };

  const togglePago = (id) => setDespesas(despesas.map(d => d.id === id ? { ...d, pago: !d.pago } : d));
  const deleteDespesa = (id) => setDespesas(despesas.filter(d => d.id !== id));
  const deleteReceita = (id) => setReceitas(receitas.filter(r => r.id !== id));

  const startEdit = (d) => {
    setNovaDespesa({ nome: d.nome, valor: String(d.valor), vencimento: d.vencimento || "", prioridade: d.prioridade, categoria: d.categoria || "", fixa: d.fixa || false, diaVencimento: d.diaVencimento || "" });
    setEditId(d.id); setShowDespesaForm(true); setTab("despesas");
  };

  // ── Investimentos CRUD ────────────────────────────────────────────────────
  const taxaEfetiva = (inv) => inv.taxaPersonalizada ? parseFloat(inv.taxaPersonalizada) / 100 : TIPOS_INV[inv.tipo]?.taxaAnual ?? 0.10;

  const addInvestimento = () => {
    if (!novoInv.nome || !novoInv.aporte || !novoInv.dataInicio) return;
    const base = { ...novoInv, aporte: parseFloat(novoInv.aporte), taxaPersonalizada: novoInv.taxaPersonalizada ? parseFloat(novoInv.taxaPersonalizada) : null };
    if (editInvId) { setInvestimentos(investimentos.map(i => i.id === editInvId ? { ...i, ...base } : i)); setEditInvId(null); }
    else setInvestimentos([...investimentos, { ...base, id: Date.now() }]);
    setNovoInv(EMPTY_INV); setShowInvForm(false);
  };

  const deleteInv = (id) => setInvestimentos(investimentos.filter(i => i.id !== id));

  const startEditInv = (inv) => {
    setNovoInv({ nome: inv.nome, tipo: inv.tipo, aporte: String(inv.aporte), dataInicio: inv.dataInicio, taxaPersonalizada: inv.taxaPersonalizada ? String(inv.taxaPersonalizada * 100) : "" });
    setEditInvId(inv.id); setShowInvForm(true); setTab("investimentos");
  };

  const handleComprovanteConfirm = (id) => {
    const d = despesas.find(x => x.id === id);
    setDespesas(despesas.map(x => x.id === id ? { ...x, pago: true } : x));
    setShowComprovante(false);
    showToast(`✅ "${d?.nome}" marcada como paga via comprovante!`);
  };

  const despesasFiltradas = useMemo(() => {
    if (filtroTipo === "fixa") return despesas.filter(d => d.fixa);
    if (filtroTipo === "variavel") return despesas.filter(d => !d.fixa);
    return despesas;
  }, [despesas, filtroTipo]);

  const runningBalance = useMemo(() => {
    let bal = totalReceitas;
    return ranking.map(d => { bal -= d.valor; return { ...d, balanceAfter: bal }; });
  }, [ranking, totalReceitas]);

  const S = {
    app: { fontFamily: "-apple-system,'SF Pro Display','DM Sans',sans-serif", minHeight: "100dvh", background: "#f8fafc", color: "#1e293b", overflowX: "hidden" },
    header: { background: "linear-gradient(160deg,#1e293b 0%,#0f172a 100%)", color: "#fff", paddingLeft: 20, paddingRight: 20, paddingBottom: 18, display: "flex", alignItems: "center", justifyContent: "space-between" },
    headerTitle: { fontSize: 19, fontWeight: 800, letterSpacing: -0.5, margin: 0, lineHeight: 1.2 },
    headerSub: { fontSize: 12, color: "#94a3b8", marginTop: 1 },
    main: { padding: "16px 16px 0", maxWidth: 600, margin: "0 auto" },
    card: { background: "#fff", borderRadius: 20, padding: 16, boxShadow: "0 2px 8px rgba(0,0,0,0.06)", border: "1px solid #f1f5f9", marginBottom: 12 },
    grid4: { display: "grid", gridTemplateColumns: "1fr 1fr", gap: 10, marginBottom: 14 },
    statCard: (color, bg) => ({ background: bg, borderRadius: 16, padding: "14px 16px", border: `1px solid ${color}20` }),
    statLabel: { fontSize: 10, fontWeight: 700, textTransform: "uppercase", letterSpacing: 0.8, color: "#94a3b8", marginBottom: 3 },
    statValue: (color) => ({ fontSize: 20, fontWeight: 800, color, letterSpacing: -0.5 }),
    btn: (v = "primary") => ({
      background: v === "primary" ? "#3b82f6" : v === "danger" ? "#ef4444" : v === "success" ? "#22c55e" : v === "purple" ? "#7c3aed" : v === "teal" ? "#0d9488" : "#f1f5f9",
      color: ["primary","danger","success","purple","teal"].includes(v) ? "#fff" : "#475569",
      border: "none", borderRadius: 12, padding: "10px 18px", fontSize: 14, fontWeight: 700,
      cursor: "pointer", WebkitAppearance: "none", minHeight: 44,
    }),
    input: { width: "100%", border: "1.5px solid #e2e8f0", borderRadius: 12, padding: "13px 14px", fontSize: 16, fontFamily: "inherit", outline: "none", boxSizing: "border-box", color: "#1e293b", background: "#fff", WebkitAppearance: "none" },
    select: { width: "100%", border: "1.5px solid #e2e8f0", borderRadius: 12, padding: "13px 14px", fontSize: 16, fontFamily: "inherit", outline: "none", boxSizing: "border-box", color: "#1e293b", background: "#fff", WebkitAppearance: "none" },
    label: { fontSize: 12, fontWeight: 700, color: "#64748b", marginBottom: 6, display: "block", textTransform: "uppercase", letterSpacing: 0.5 },
    row: { display: "flex", gap: 10, alignItems: "center", justifyContent: "space-between", padding: "15px 0", borderBottom: "1px solid #f1f5f9" },
    rankItem: (i) => ({ display: "flex", gap: 10, alignItems: "center", padding: "14px 14px", borderRadius: 16, background: i === 0 ? "#eff6ff" : "#fff", border: i === 0 ? "1.5px solid #bfdbfe" : "1px solid #f1f5f9", marginBottom: 10 }),
    rankNum: (i) => ({ width: 30, height: 30, borderRadius: "50%", display: "flex", alignItems: "center", justifyContent: "center", fontWeight: 800, fontSize: 13, background: i === 0 ? "#3b82f6" : i === 1 ? "#64748b" : "#e2e8f0", color: i < 2 ? "#fff" : "#64748b", flexShrink: 0 }),
  };

  const InputField = ({ label, ...props }) => (
    <div><label style={S.label}>{label}</label><input style={S.input} {...props} /></div>
  );

  return (
    <div style={S.app}>
      <GlobalStyle />
      {/* Toast */}
      {toastMsg && (
        <div style={{ position: "fixed", top: "calc(env(safe-area-inset-top) + 16px)", right: 16, zIndex: 2000, background: "#1e293b", color: "#fff", borderRadius: 12, padding: "12px 20px", fontWeight: 600, fontSize: 14, boxShadow: "0 8px 30px rgba(0,0,0,0.25)", maxWidth: 320 }}>
          {toastMsg}
        </div>
      )}

      {/* Comprovante Modal */}
      {showComprovante && (
        <ComprovanteModal
          despesas={despesas}
          onClose={() => setShowComprovante(false)}
          onConfirm={handleComprovanteConfirm}
        />
      )}

      <header className="app-header" style={S.header}>
        <div>
          <h1 style={S.headerTitle}>💰 Planejamento Financeiro</h1>
          <p style={S.headerSub}>Victor Hugo</p>
        </div>
        <div style={{ textAlign: "right" }}>
          <div style={{ fontSize: 10, color: "#94a3b8", fontWeight: 600, textTransform: "uppercase", letterSpacing: 0.5 }}>Saldo Mensal</div>
          <div style={{ fontSize: 22, fontWeight: 800, color: saldo >= 0 ? "#4ade80" : "#f87171", letterSpacing: -0.5 }}>{fmt(saldo)}</div>
        </div>
      </header>

      <main style={S.main} className="tab-content">

        {/* DASHBOARD */}
        {tab === "dashboard" && (
          <div>
            <div style={S.grid4}>
              <div style={S.statCard("#22c55e","#f0fdf4")}><div style={S.statLabel}>Receitas</div><div style={S.statValue("#22c55e")}>{fmt(totalReceitas)}</div></div>
              <div style={S.statCard("#7c3aed","#ede9fe")}><div style={S.statLabel}>📌 Fixas</div><div style={S.statValue("#7c3aed")}>{fmt(totalFixas)}</div><div style={{ fontSize: 11, color: "#a78bfa", marginTop: 2 }}>{despesas.filter(d => d.fixa).length} despesas</div></div>
              <div style={S.statCard("#64748b","#f8fafc")}><div style={S.statLabel}>Variáveis</div><div style={S.statValue("#475569")}>{fmt(totalVariaveis)}</div></div>
              <div style={S.statCard(saldo >= 0 ? "#3b82f6" : "#ef4444", saldo >= 0 ? "#eff6ff" : "#fef2f2")}><div style={S.statLabel}>Saldo Final</div><div style={S.statValue(saldo >= 0 ? "#3b82f6" : "#ef4444")}>{fmt(saldo)}</div></div>
            </div>

            {/* Investimentos resumo no dashboard */}
            {investimentos.length > 0 && (
              <div style={{ ...S.card, marginBottom: 16, background: "linear-gradient(135deg,#065f46,#047857)", border: "none", cursor: "pointer" }} onClick={() => setTab("investimentos")}>
                <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", flexWrap: "wrap", gap: 10 }}>
                  <div>
                    <div style={{ fontWeight: 800, color: "#fff", fontSize: 15, marginBottom: 2 }}>📈 Meus Investimentos</div>
                    <div style={{ fontSize: 13, color: "#6ee7b7" }}>{investimentos.length} ativo{investimentos.length > 1 ? "s" : ""} · Aporte total: {fmt(investimentos.reduce((s,i)=>s+i.aporte,0))}</div>
                  </div>
                  <div style={{ textAlign: "right" }}>
                    <div style={{ fontSize: 11, color: "#6ee7b7", fontWeight: 700 }}>⚡ Rendendo agora</div>
                    <div style={{ fontSize: 22, fontWeight: 800, color: "#fff" }}>
                      <TickerTotalRend investimentos={investimentos} taxaEfetiva={taxaEfetiva} />
                    </div>
                  </div>
                </div>
              </div>
            )}

            {/* Comprovante CTA */}
            <div style={{ ...S.card, marginBottom: 16, background: "linear-gradient(135deg, #0f766e, #0d9488)", border: "none", display: "flex", alignItems: "center", justifyContent: "space-between", flexWrap: "wrap", gap: 12 }}>
              <div>
                <div style={{ fontWeight: 800, color: "#fff", fontSize: 15, marginBottom: 2 }}>🧾 Enviar Comprovante</div>
                <div style={{ fontSize: 13, color: "#99f6e4" }}>A IA lê o comprovante e registra o pagamento automaticamente</div>
              </div>
              <button style={{ background: "#fff", color: "#0f766e", border: "none", borderRadius: 10, padding: "10px 20px", fontWeight: 700, fontSize: 13, cursor: "pointer" }} onClick={() => setShowComprovante(true)}>
                Enviar agora →
              </button>
            </div>

            <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 16 }}>
              <div style={S.card}>
                <h3 style={{ margin: "0 0 14px", fontSize: 14, fontWeight: 700, color: "#475569" }}>📈 Progresso de Pagamentos</h3>
                <div style={{ marginBottom: 8, fontSize: 13, color: "#64748b" }}>{despesas.filter(d => d.pago).length} de {despesas.length} pagas</div>
                <div style={{ background: "#f1f5f9", borderRadius: 99, height: 10, overflow: "hidden" }}>
                  <div style={{ width: `${despesas.length ? (despesas.filter(d => d.pago).length / despesas.length) * 100 : 0}%`, background: "linear-gradient(90deg,#22c55e,#4ade80)", height: "100%", borderRadius: 99, transition: "width .5s" }} />
                </div>
                <div style={{ marginTop: 12, fontSize: 12, color: "#94a3b8" }}>Pago: {fmt(totalPago)} / Pendente: {fmt(totalPendente)}</div>
              </div>
              <div style={S.card}>
                <h3 style={{ margin: "0 0 14px", fontSize: 14, fontWeight: 700, color: "#475569" }}>🚨 Vencendo em Breve</h3>
                {despesas.filter(d => !d.pago && daysUntil(d.vencimento) !== null && daysUntil(d.vencimento) <= 7)
                  .sort((a, b) => (daysUntil(a.vencimento) || 0) - (daysUntil(b.vencimento) || 0))
                  .slice(0, 4).map(d => (
                    <div key={d.id} style={{ display: "flex", justifyContent: "space-between", alignItems: "center", padding: "6px 0", borderBottom: "1px solid #f8fafc" }}>
                      <div style={{ display: "flex", gap: 6, alignItems: "center" }}>
                        <span style={{ fontSize: 13, fontWeight: 600 }}>{d.nome}</span>
                        {d.fixa && <span style={{ fontSize: 10, background: "#ede9fe", color: "#7c3aed", borderRadius: 8, padding: "1px 6px", fontWeight: 700 }}>FIXA</span>}
                        <DaysBadge dateStr={d.vencimento} />
                      </div>
                      <span style={{ fontSize: 13, fontWeight: 700, color: "#ef4444" }}>{fmt(d.valor)}</span>
                    </div>
                  ))}
                {despesas.filter(d => !d.pago && daysUntil(d.vencimento) !== null && daysUntil(d.vencimento) <= 7).length === 0 && (
                  <p style={{ color: "#94a3b8", fontSize: 13 }}>Nenhuma despesa vencendo em 7 dias 🎉</p>
                )}
              </div>
            </div>
          </div>
        )}

        {/* RANKING */}
        {tab === "ranking" && (
          <div>
            <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 16, flexWrap: "wrap", gap: 10 }}>
              <div>
                <h2 style={{ margin: 0, fontSize: 18, fontWeight: 800 }}>🏆 Ranking de Pagamento</h2>
                <p style={{ margin: "4px 0 0", fontSize: 13, color: "#64748b" }}>Ordem: prioridade → vencimento</p>
              </div>
              <div style={{ display: "flex", gap: 8, alignItems: "center" }}>
                <button style={{ ...S.btn("teal"), fontSize: 12, padding: "7px 12px" }} onClick={() => setShowComprovante(true)}>🧾 Comprovante</button>
                <div style={{ textAlign: "right" }}>
                  <div style={{ fontSize: 11, color: "#94a3b8" }}>Saldo</div>
                  <div style={{ fontSize: 18, fontWeight: 800, color: "#22c55e" }}>{fmt(totalReceitas)}</div>
                </div>
              </div>
            </div>

            {ranking.length === 0 && <div style={{ ...S.card, textAlign: "center", padding: 40, color: "#94a3b8" }}>🎉 Todas as despesas foram pagas!</div>}

            {runningBalance.map((d, i) => (
              <div key={d.id} style={{ ...S.rankItem(i), flexWrap: "wrap" }}>
                <div style={S.rankNum(i)}>{i + 1}</div>
                <div style={{ flex: 1, minWidth: 140 }}>
                  <div style={{ display: "flex", gap: 6, alignItems: "center", flexWrap: "wrap" }}>
                    <span style={{ fontWeight: 700, fontSize: 15 }}>{d.nome}</span>
                    {d.fixa && <FixaBadge />}
                  </div>
                  <div style={{ fontSize: 12, color: "#94a3b8", marginTop: 2 }}>
                    {d.categoria && <span>{d.categoria} · </span>}Vence: {fmtDate(d.vencimento)} <DaysBadge dateStr={d.vencimento} />
                  </div>
                </div>
                <div style={{ display: "flex", gap: 8, alignItems: "center", flexWrap: "wrap" }}>
                  <Badge priority={d.prioridade} />
                  <div style={{ textAlign: "right" }}>
                    <div style={{ fontWeight: 800, fontSize: 16 }}>{fmt(d.valor)}</div>
                    <div style={{ fontSize: 11, color: d.balanceAfter >= 0 ? "#22c55e" : "#ef4444" }}>Saldo após: {fmt(d.balanceAfter)}</div>
                  </div>
                  <button style={S.btn("success")} onClick={() => togglePago(d.id)}>✓ Pagar</button>
                </div>
              </div>
            ))}

            {despesas.filter(d => d.pago).length > 0 && (
              <div style={{ marginTop: 24 }}>
                <h3 style={{ fontSize: 14, fontWeight: 700, color: "#94a3b8", marginBottom: 8 }}>✅ Já Pagas</h3>
                {despesas.filter(d => d.pago).map(d => (
                  <div key={d.id} style={{ display: "flex", gap: 12, alignItems: "center", padding: "10px 16px", borderRadius: 10, background: "#f0fdf4", border: "1px solid #bbf7d0", marginBottom: 6, opacity: 0.8 }}>
                    <span style={{ fontSize: 18 }}>✅</span>
                    <div style={{ flex: 1, display: "flex", gap: 6, alignItems: "center" }}>
                      <span style={{ fontWeight: 600, textDecoration: "line-through", color: "#64748b" }}>{d.nome}</span>
                      {d.fixa && <FixaBadge />}
                    </div>
                    <span style={{ fontWeight: 700, color: "#22c55e" }}>{fmt(d.valor)}</span>
                    <button style={{ ...S.btn("ghost"), padding: "6px 10px" }} onClick={() => togglePago(d.id)}>↩ Desfazer</button>
                  </div>
                ))}
              </div>
            )}
          </div>
        )}

        {/* DESPESAS */}
        {tab === "despesas" && (
          <div>
            <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 16 }}>
              <h2 style={{ margin: 0, fontSize: 18, fontWeight: 800 }}>📋 Despesas</h2>
              <div style={{ display: "flex", gap: 8 }}>
                <button style={{ ...S.btn("teal"), fontSize: 12, padding: "7px 12px" }} onClick={() => setShowComprovante(true)}>🧾 Comprovante</button>
                <button style={S.btn("primary")} onClick={() => { setShowDespesaForm(!showDespesaForm); setEditId(null); setNovaDespesa(EMPTY_DESPESA); }}>
                  {showDespesaForm ? "✕ Cancelar" : "+ Nova Despesa"}
                </button>
              </div>
            </div>

            {showDespesaForm && (
              <div style={{ ...S.card, marginBottom: 16, border: "1.5px solid #bfdbfe", background: "#eff6ff" }}>
                <h3 style={{ margin: "0 0 14px", fontSize: 14, fontWeight: 700 }}>{editId ? "✏️ Editar Despesa" : "➕ Nova Despesa"}</h3>
                <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 10 }}>
                  <InputField label="Nome" placeholder="Ex: Aluguel" value={novaDespesa.nome} onChange={e => setNovaDespesa({ ...novaDespesa, nome: e.target.value })} />
                  <InputField label="Valor (R$)" type="number" placeholder="0,00" value={novaDespesa.valor} onChange={e => setNovaDespesa({ ...novaDespesa, valor: e.target.value })} />
                  <div style={{ gridColumn: "1 / -1" }}>
                    <div style={{ display: "flex", alignItems: "center", gap: 10, padding: "10px 14px", borderRadius: 10, background: novaDespesa.fixa ? "#ede9fe" : "#f8fafc", border: `1.5px solid ${novaDespesa.fixa ? "#c4b5fd" : "#e2e8f0"}`, cursor: "pointer" }}
                      onClick={() => setNovaDespesa({ ...novaDespesa, fixa: !novaDespesa.fixa, diaVencimento: "" })}>
                      <div style={{ width: 36, height: 20, borderRadius: 99, background: novaDespesa.fixa ? "#7c3aed" : "#e2e8f0", position: "relative", flexShrink: 0 }}>
                        <div style={{ width: 16, height: 16, borderRadius: "50%", background: "#fff", position: "absolute", top: 2, left: novaDespesa.fixa ? 18 : 2, transition: "left .2s", boxShadow: "0 1px 3px rgba(0,0,0,.2)" }} />
                      </div>
                      <div>
                        <div style={{ fontSize: 13, fontWeight: 700, color: novaDespesa.fixa ? "#7c3aed" : "#475569" }}>📌 Despesa Fixa</div>
                        <div style={{ fontSize: 11, color: "#94a3b8" }}>Repete todo mês no mesmo dia</div>
                      </div>
                    </div>
                  </div>
                  {novaDespesa.fixa
                    ? <InputField label="Dia de Vencimento (todo mês)" type="number" placeholder="Ex: 10" min="1" max="31" value={novaDespesa.diaVencimento} onChange={e => setNovaDespesa({ ...novaDespesa, diaVencimento: e.target.value })} />
                    : <InputField label="Data de Vencimento" type="date" value={novaDespesa.vencimento} onChange={e => setNovaDespesa({ ...novaDespesa, vencimento: e.target.value })} />
                  }
                  <div>
                    <label style={S.label}>Prioridade</label>
                    <select style={S.select} value={novaDespesa.prioridade} onChange={e => setNovaDespesa({ ...novaDespesa, prioridade: e.target.value })}>
                      {Object.entries(PRIORITY_CONFIG).map(([k, v]) => <option key={k} value={k}>{v.icon} {v.label}</option>)}
                    </select>
                  </div>
                  <InputField label="Categoria" placeholder="Ex: Moradia, Saúde..." value={novaDespesa.categoria} onChange={e => setNovaDespesa({ ...novaDespesa, categoria: e.target.value })} />
                </div>
                <div style={{ marginTop: 12 }}>
                  <button style={S.btn("primary")} onClick={addDespesa}>{editId ? "💾 Salvar" : "✓ Adicionar"}</button>
                </div>
              </div>
            )}

            <div style={{ display: "flex", gap: 8, marginBottom: 12 }}>
              {[["todas","Todas"],["fixa","📌 Fixas"],["variavel","🔄 Variáveis"]].map(([v, l]) => (
                <button key={v} style={{ ...S.btn(filtroTipo === v ? "primary" : "ghost"), padding: "6px 14px", fontSize: 12 }} onClick={() => setFiltroTipo(v)}>{l}</button>
              ))}
            </div>

            <div style={S.card}>
              {despesasFiltradas.length === 0 && <p style={{ color: "#94a3b8", textAlign: "center", padding: 20 }}>Nenhuma despesa encontrada.</p>}
              {despesasFiltradas.map(d => (
                <div key={d.id} style={{ ...S.row, opacity: d.pago ? 0.6 : 1 }}>
                  <div style={{ display: "flex", gap: 10, alignItems: "center", flex: 1 }}>
                    <input type="checkbox" checked={d.pago} onChange={() => togglePago(d.id)} style={{ width: 16, height: 16, cursor: "pointer" }} />
                    <div>
                      <div style={{ display: "flex", gap: 6, alignItems: "center" }}>
                        <span style={{ fontWeight: 600, textDecoration: d.pago ? "line-through" : "none", color: d.pago ? "#94a3b8" : "#1e293b" }}>{d.nome}</span>
                        {d.fixa && <FixaBadge />}
                      </div>
                      <div style={{ fontSize: 12, color: "#94a3b8" }}>
                        {d.categoria}{d.fixa && d.diaVencimento ? ` · Todo dia ${d.diaVencimento}` : d.vencimento ? ` · ${fmtDate(d.vencimento)}` : ""}{" "}<DaysBadge dateStr={d.vencimento} />
                      </div>
                    </div>
                  </div>
                  <div style={{ display: "flex", gap: 8, alignItems: "center" }}>
                    <Badge priority={d.prioridade} />
                    <span style={{ fontWeight: 700, minWidth: 80, textAlign: "right" }}>{fmt(d.valor)}</span>
                    <button style={{ ...S.btn("ghost"), padding: "6px 10px" }} onClick={() => startEdit(d)}>✏️</button>
                    <button style={{ ...S.btn("danger"), padding: "6px 10px" }} onClick={() => deleteDespesa(d.id)}>🗑</button>
                  </div>
                </div>
              ))}
            </div>
          </div>
        )}

        {/* ABA FIXAS */}
        {tab === "fixas" && (
          <div>
            <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 8 }}>
              <div>
                <h2 style={{ margin: 0, fontSize: 18, fontWeight: 800 }}>📌 Despesas Fixas</h2>
                <p style={{ margin: "4px 0 0", fontSize: 13, color: "#64748b" }}>Despesas que se repetem todo mês</p>
              </div>
              <button style={S.btn("purple")} onClick={() => { setTab("despesas"); setNovaDespesa({ ...EMPTY_DESPESA, fixa: true }); setShowDespesaForm(true); }}>+ Nova Fixa</button>
            </div>
            <div style={{ display: "grid", gridTemplateColumns: "repeat(auto-fit, minmax(150px, 1fr))", gap: 10, marginBottom: 16 }}>
              <div style={S.statCard("#7c3aed","#ede9fe")}><div style={S.statLabel}>Total Fixo/mês</div><div style={S.statValue("#7c3aed")}>{fmt(totalFixas)}</div></div>
              <div style={S.statCard("#64748b","#f8fafc")}><div style={S.statLabel}>Qtd. Fixas</div><div style={S.statValue("#475569")}>{despesas.filter(d => d.fixa).length}</div></div>
              <div style={S.statCard("#3b82f6","#eff6ff")}><div style={S.statLabel}>% da Renda</div><div style={S.statValue("#3b82f6")}>{totalReceitas ? ((totalFixas / totalReceitas) * 100).toFixed(0) : 0}%</div></div>
            </div>
            <div style={S.card}>
              <h3 style={{ margin: "0 0 14px", fontSize: 13, fontWeight: 700, color: "#64748b" }}>Ordenadas por dia de vencimento</h3>
              {despesas.filter(d => d.fixa).length === 0 && <p style={{ color: "#94a3b8", textAlign: "center", padding: 20 }}>Nenhuma despesa fixa cadastrada.</p>}
              {[...despesas.filter(d => d.fixa)].sort((a, b) => (a.diaVencimento || 99) - (b.diaVencimento || 99)).map(d => (
                <div key={d.id} style={{ ...S.row }}>
                  <div style={{ display: "flex", gap: 12, alignItems: "center", flex: 1 }}>
                    <div style={{ width: 36, height: 36, borderRadius: 10, background: "#ede9fe", display: "flex", alignItems: "center", justifyContent: "center", flexShrink: 0 }}>
                      <span style={{ fontSize: 13, fontWeight: 800, color: "#7c3aed" }}>{d.diaVencimento || "?"}</span>
                    </div>
                    <div>
                      <div style={{ fontWeight: 600 }}>{d.nome}</div>
                      <div style={{ fontSize: 12, color: "#94a3b8" }}>{d.categoria}{d.diaVencimento ? ` · Todo dia ${d.diaVencimento} de cada mês` : " · Dia não definido"}</div>
                    </div>
                  </div>
                  <div style={{ display: "flex", gap: 8, alignItems: "center" }}>
                    <Badge priority={d.prioridade} />
                    <span style={{ fontWeight: 800, fontSize: 16 }}>{fmt(d.valor)}</span>
                    <button style={{ ...S.btn("ghost"), padding: "6px 10px" }} onClick={() => startEdit(d)}>✏️</button>
                    <button style={{ ...S.btn("danger"), padding: "6px 10px" }} onClick={() => deleteDespesa(d.id)}>🗑</button>
                  </div>
                </div>
              ))}
              {despesas.filter(d => d.fixa).length > 0 && (
                <div style={{ marginTop: 14, padding: "12px 0 0", borderTop: "1px solid #f1f5f9", display: "flex", justifyContent: "space-between" }}>
                  <span style={{ fontSize: 13, fontWeight: 700, color: "#475569" }}>Total comprometido por mês</span>
                  <span style={{ fontSize: 18, fontWeight: 800, color: "#7c3aed" }}>{fmt(totalFixas)}</span>
                </div>
              )}
            </div>
          </div>
        )}

        {/* RECEITAS */}
        {tab === "receitas" && (
          <div>
            <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 16 }}>
              <h2 style={{ margin: 0, fontSize: 18, fontWeight: 800 }}>💵 Receitas</h2>
              <button style={S.btn("success")} onClick={() => setShowReceitaForm(!showReceitaForm)}>
                {showReceitaForm ? "✕ Cancelar" : "+ Nova Receita"}
              </button>
            </div>
            {showReceitaForm && (
              <div style={{ ...S.card, marginBottom: 16, border: "1.5px solid #bbf7d0", background: "#f0fdf4" }}>
                <h3 style={{ margin: "0 0 14px", fontSize: 14, fontWeight: 700 }}>➕ Nova Receita</h3>
                <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 10 }}>
                  <InputField label="Nome" placeholder="Ex: Salário" value={novaReceita.nome} onChange={e => setNovaReceita({ ...novaReceita, nome: e.target.value })} />
                  <InputField label="Valor (R$)" type="number" value={novaReceita.valor} onChange={e => setNovaReceita({ ...novaReceita, valor: e.target.value })} />
                  <InputField label="Data" type="date" value={novaReceita.data} onChange={e => setNovaReceita({ ...novaReceita, data: e.target.value })} />
                  <div style={{ display: "flex", alignItems: "center", gap: 8, paddingTop: 20 }}>
                    <input type="checkbox" id="rec" checked={novaReceita.recorrente} onChange={e => setNovaReceita({ ...novaReceita, recorrente: e.target.checked })} />
                    <label htmlFor="rec" style={{ fontSize: 13, cursor: "pointer" }}>Recorrente (mensal)</label>
                  </div>
                </div>
                <div style={{ marginTop: 12 }}>
                  <button style={S.btn("success")} onClick={addReceita}>✓ Adicionar</button>
                </div>
              </div>
            )}
            <div style={{ ...S.card, marginBottom: 16, background: "#f0fdf4", border: "1px solid #bbf7d0" }}>
              <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center" }}>
                <span style={{ fontSize: 14, fontWeight: 700, color: "#16a34a" }}>Total de Receitas</span>
                <span style={{ fontSize: 24, fontWeight: 800, color: "#16a34a" }}>{fmt(totalReceitas)}</span>
              </div>
            </div>
            <div style={S.card}>
              {receitas.length === 0 && <p style={{ color: "#94a3b8", textAlign: "center", padding: 20 }}>Nenhuma receita cadastrada.</p>}
              {receitas.map(r => (
                <div key={r.id} style={S.row}>
                  <div>
                    <div style={{ fontWeight: 600 }}>{r.nome} {r.recorrente && <span style={{ fontSize: 11, background: "#dbeafe", color: "#2563eb", borderRadius: 10, padding: "2px 8px", fontWeight: 700 }}>Recorrente</span>}</div>
                    <div style={{ fontSize: 12, color: "#94a3b8" }}>{fmtDate(r.data)}</div>
                  </div>
                  <div style={{ display: "flex", gap: 8, alignItems: "center" }}>
                    <span style={{ fontWeight: 700, color: "#22c55e", fontSize: 16 }}>{fmt(r.valor)}</span>
                    <button style={{ ...S.btn("danger"), padding: "6px 10px" }} onClick={() => deleteReceita(r.id)}>🗑</button>
                  </div>
                </div>
              ))}
            </div>
          </div>
        )}

        {/* INVESTIMENTOS */}
        {tab === "investimentos" && (() => {
          const totalAportado = investimentos.reduce((s, i) => s + i.aporte, 0);
          const rendTotalEst = investimentos.reduce((s, inv) => s + rendimentoAtual(inv.aporte, taxaEfetiva(inv), inv.dataInicio), 0);
          const patrimonioEst = totalAportado + rendTotalEst;

          return (
            <div>
              <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 16 }}>
                <div>
                  <h2 style={{ margin: 0, fontSize: 18, fontWeight: 800 }}>📈 Investimentos</h2>
                  <p style={{ margin: "4px 0 0", fontSize: 13, color: "#64748b" }}>Rendimento acumulado em tempo real</p>
                </div>
                <button style={S.btn("success")} onClick={() => { setShowInvForm(!showInvForm); setEditInvId(null); setNovoInv(EMPTY_INV); }}>
                  {showInvForm ? "✕ Cancelar" : "+ Novo Investimento"}
                </button>
              </div>

              {/* Cards resumo */}
              <div style={{ display: "grid", gridTemplateColumns: "repeat(auto-fit, minmax(160px, 1fr))", gap: 12, marginBottom: 16 }}>
                <div style={{ background: "linear-gradient(135deg,#065f46,#047857)", borderRadius: 14, padding: "16px 18px" }}>
                  <div style={{ fontSize: 11, fontWeight: 700, color: "#6ee7b7", textTransform: "uppercase", letterSpacing: 1 }}>Total Investido</div>
                  <div style={{ fontSize: 20, fontWeight: 800, color: "#fff", marginTop: 4 }}>{fmt(totalAportado)}</div>
                </div>
                <div style={{ background: "linear-gradient(135deg,#1d4ed8,#2563eb)", borderRadius: 14, padding: "16px 18px" }}>
                  <div style={{ fontSize: 11, fontWeight: 700, color: "#bfdbfe", textTransform: "uppercase", letterSpacing: 1 }}>Rendimento Acum.</div>
                  <div style={{ fontSize: 20, fontWeight: 800, color: "#fff", marginTop: 4 }}>
                    <TickerTotalRend investimentos={investimentos} taxaEfetiva={taxaEfetiva} />
                  </div>
                </div>
                <div style={{ background: "linear-gradient(135deg,#6d28d9,#7c3aed)", borderRadius: 14, padding: "16px 18px" }}>
                  <div style={{ fontSize: 11, fontWeight: 700, color: "#ddd6fe", textTransform: "uppercase", letterSpacing: 1 }}>Patrimônio Total</div>
                  <div style={{ fontSize: 20, fontWeight: 800, color: "#fff", marginTop: 4 }}>
                    <TickerPatrimonio investimentos={investimentos} taxaEfetiva={taxaEfetiva} totalAportado={totalAportado} />
                  </div>
                </div>
                <div style={S.statCard("#f59e0b","#fffbeb")}>
                  <div style={S.statLabel}>Qtd. Ativos</div>
                  <div style={S.statValue("#d97706")}>{investimentos.length}</div>
                </div>
              </div>

              {/* Formulário */}
              {showInvForm && (
                <div style={{ ...S.card, marginBottom: 16, border: "1.5px solid #bbf7d0", background: "#f0fdf4" }}>
                  <h3 style={{ margin: "0 0 14px", fontSize: 14, fontWeight: 700 }}>{editInvId ? "✏️ Editar Investimento" : "➕ Novo Investimento"}</h3>
                  <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 10 }}>
                    <InputField label="Nome / Descrição" placeholder="Ex: CDB Nubank 120% CDI" value={novoInv.nome} onChange={e => setNovoInv({ ...novoInv, nome: e.target.value })} />
                    <div>
                      <label style={S.label}>Tipo</label>
                      <select style={S.select} value={novoInv.tipo} onChange={e => setNovoInv({ ...novoInv, tipo: e.target.value })}>
                        {Object.entries(TIPOS_INV).map(([k, v]) => <option key={k} value={k}>{v.icon} {v.label} ({(v.taxaAnual * 100).toFixed(2)}% a.a. est.)</option>)}
                      </select>
                    </div>
                    <InputField label="Valor Investido (R$)" type="number" placeholder="0,00" value={novoInv.aporte} onChange={e => setNovoInv({ ...novoInv, aporte: e.target.value })} />
                    <InputField label="Data do Aporte" type="date" value={novoInv.dataInicio} onChange={e => setNovoInv({ ...novoInv, dataInicio: e.target.value })} />
                    <div style={{ gridColumn: "1 / -1" }}>
                      <InputField label="Taxa personalizada % a.a. (opcional — deixe vazio para usar estimativa do tipo)" type="number" placeholder={`Padrão: ${((TIPOS_INV[novoInv.tipo]?.taxaAnual ?? 0.10) * 100).toFixed(2)}%`} value={novoInv.taxaPersonalizada} onChange={e => setNovoInv({ ...novoInv, taxaPersonalizada: e.target.value })} />
                    </div>
                  </div>
                  <div style={{ marginTop: 12 }}>
                    <button style={S.btn("success")} onClick={addInvestimento}>{editInvId ? "💾 Salvar" : "✓ Adicionar"}</button>
                  </div>
                </div>
              )}

              {/* Lista de investimentos */}
              {investimentos.length === 0 && (
                <div style={{ ...S.card, textAlign: "center", padding: 40, color: "#94a3b8" }}>
                  Nenhum investimento cadastrado.<br />
                  <span style={{ fontSize: 13 }}>Clique em "+ Novo Investimento" para começar.</span>
                </div>
              )}

              {investimentos.map(inv => {
                const tipo = TIPOS_INV[inv.tipo] || TIPOS_INV.outro;
                const taxa = taxaEfetiva(inv);
                const rendAcum = rendimentoAtual(inv.aporte, taxa, inv.dataInicio);
                const msInicio = new Date(inv.dataInicio + "T00:00:00").getTime();
                const diasInv = Math.max(0, Math.floor((Date.now() - msInicio) / 86400000));
                const rendMensal = inv.aporte * (Math.pow(1 + taxa, 1/12) - 1);

                return (
                  <div key={inv.id} style={{ ...S.card, marginBottom: 12, borderLeft: `4px solid ${tipo.cor}`, padding: "16px 20px" }}>
                    <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-start", flexWrap: "wrap", gap: 10 }}>
                      <div style={{ flex: 1, minWidth: 180 }}>
                        <div style={{ display: "flex", alignItems: "center", gap: 8, marginBottom: 4 }}>
                          <span style={{ fontSize: 22 }}>{tipo.icon}</span>
                          <div>
                            <div style={{ fontWeight: 800, fontSize: 15 }}>{inv.nome}</div>
                            <div style={{ fontSize: 12, color: "#94a3b8" }}>
                              {tipo.label} · {(taxa * 100).toFixed(2)}% a.a. · Desde {fmtDate(inv.dataInicio)} ({diasInv}d)
                            </div>
                          </div>
                        </div>

                        {/* Barra de progresso do rendimento */}
                        <div style={{ marginTop: 8 }}>
                          <div style={{ display: "flex", justifyContent: "space-between", fontSize: 11, color: "#94a3b8", marginBottom: 3 }}>
                            <span>Aporte: {fmt(inv.aporte)}</span>
                            <span>Rendimento: {((rendAcum / inv.aporte) * 100).toFixed(3)}%</span>
                          </div>
                          <div style={{ background: "#f1f5f9", borderRadius: 99, height: 6, overflow: "hidden" }}>
                            <div style={{ width: `${Math.min(100, (rendAcum / inv.aporte) * 100 * 5)}%`, background: `linear-gradient(90deg, ${tipo.cor}99, ${tipo.cor})`, height: "100%", borderRadius: 99, transition: "width 1s" }} />
                          </div>
                        </div>
                      </div>

                      <div style={{ display: "flex", gap: 16, alignItems: "flex-start", flexWrap: "wrap" }}>
                        {/* Ticker rendimento */}
                        <div style={{ background: "#f0fdf4", border: "1px solid #bbf7d0", borderRadius: 12, padding: "10px 16px", textAlign: "right", minWidth: 140 }}>
                          <div style={{ fontSize: 11, color: "#16a34a", fontWeight: 700, textTransform: "uppercase", letterSpacing: 0.5 }}>⚡ Rendimento total</div>
                          <div style={{ fontSize: 18, fontWeight: 800, color: "#16a34a", fontVariantNumeric: "tabular-nums" }}>
                            <TickerRend valorAportado={inv.aporte} taxaAnual={taxa} dataInicio={inv.dataInicio} />
                          </div>
                          <div style={{ fontSize: 11, color: "#64748b", marginTop: 2 }}>~{fmt(rendMensal)}/mês</div>
                        </div>

                        <div style={{ display: "flex", flexDirection: "column", gap: 6, paddingTop: 4 }}>
                          <div style={{ textAlign: "right" }}>
                            <div style={{ fontSize: 11, color: "#94a3b8" }}>Patrimônio atual</div>
                            <div style={{ fontSize: 16, fontWeight: 800, color: tipo.cor }}>{fmt(inv.aporte + rendAcum)}</div>
                          </div>
                          <div style={{ display: "flex", gap: 6 }}>
                            <button style={{ ...S.btn("ghost"), padding: "5px 10px", fontSize: 12 }} onClick={() => startEditInv(inv)}>✏️</button>
                            <button style={{ ...S.btn("danger"), padding: "5px 10px", fontSize: 12 }} onClick={() => deleteInv(inv.id)}>🗑</button>
                          </div>
                        </div>
                      </div>
                    </div>
                  </div>
                );
              })}

              {/* Disclaimer */}
              {investimentos.length > 0 && (
                <div style={{ marginTop: 8, padding: "10px 14px", background: "#fff7ed", borderRadius: 10, border: "1px solid #fed7aa" }}>
                  <span style={{ fontSize: 12, color: "#92400e" }}>⚠️ Os rendimentos exibidos são estimativas baseadas em taxas médias de mercado. Para valores exatos, consulte seu extrato na instituição financeira.</span>
                </div>
              )}
            </div>
          );
        })()}

      </main>

      {/* ── Bottom Navigation Bar ── */}
      <nav className="bottom-nav">
        {[
          ["dashboard",  "📊", "Início"],
          ["ranking",    "🏆", "Ranking"],
          ["despesas",   "📋", "Despesas"],
          ["fixas",      "📌", "Fixas"],
          ["receitas",   "💵", "Receitas"],
          ["investimentos","📈","Invest."],
        ].map(([id, icon, label]) => (
          <button
            key={id}
            className="nav-item"
            onClick={() => setTab(id)}
            style={{ color: tab === id ? "#3b82f6" : "#94a3b8" }}
          >
            <span className="nav-icon" style={{ filter: tab === id ? "none" : "grayscale(0.4)" }}>{icon}</span>
            <span className="nav-label" style={{ fontWeight: tab === id ? 800 : 500 }}>{label}</span>
            {tab === id && <span style={{ width: 4, height: 4, borderRadius: "50%", background: "#3b82f6", marginTop: 1 }} />}
          </button>
        ))}
      </nav>
    </div>
  );
}


    const container = document.getElementById('root');
    const reactRoot = ReactDOM.createRoot(container);
    reactRoot.render(<App />);

    // Hide splash after render
    setTimeout(() => {
      const s = document.getElementById('splash');
      if (s) { s.style.opacity = '0'; setTimeout(() => s.remove(), 400); }
    }, 600);
  </script>

  <!-- Service Worker registration for offline PWA -->
  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('sw.js').catch(() => {});
      });
    }
  </script>
</body>
</html>
